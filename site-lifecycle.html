<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClearSky OMEGA — Site Lifecycle Console</title>
<style>
/* ===== ES5-only, no build step. OMEGA dark-navy topbar theme ===== */
* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:#1b2733; background:#eef1f4; font-size:14px;
}
a { color:#1461d2; text-decoration:none; cursor:pointer; }
a:hover { text-decoration:underline; }

/* Topbar */
.tb { display:flex; align-items:center; height:52px; background:#0e1b33; color:#fff; padding:0 16px; position:sticky; top:0; z-index:50; }
.tb-omega { height:26px; margin-right:9px; }
.tb-logo-txt { font-weight:700; font-size:17px; letter-spacing:.3px; }
.tb-logo-txt span { color:#4da3ff; }
.tb-sep { width:1px; height:24px; background:#2a3c5c; margin:0 16px; }
.tb-ws { font-size:13px; color:#9fb4d6; }
.tb-ws b { color:#fff; }
.tb-right { margin-left:auto; display:flex; align-items:center; gap:14px; font-size:12px; color:#9fb4d6; }
.tb-badge { background:#123; border:1px solid #2a3c5c; color:#8fc0ff; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.4px; }
.tb-user { width:28px; height:28px; border-radius:50%; background:#2a3c5c; display:flex; align-items:center; justify-content:center; color:#cfe0ff; font-weight:700; font-size:12px; }

/* Nav tabs */
.nav { display:flex; background:#12233f; padding:0 8px; }
.nav a { color:#a9bcd8; padding:11px 16px; font-size:13px; font-weight:600; border-bottom:3px solid transparent; }
.nav a.on { color:#fff; border-bottom-color:#4da3ff; background:#0e1b33; }

/* Layout */
.wrap { padding:18px; max-width:1500px; margin:0 auto; }
.row { display:flex; gap:18px; align-items:flex-start; }
.col { flex:1; min-width:0; }

/* Cards */
.card { background:#fff; border:1px solid #dde3ea; border-radius:10px; box-shadow:0 1px 2px rgba(16,30,54,.05); }
.card-h { padding:13px 16px; border-bottom:1px solid #edf1f5; display:flex; align-items:center; gap:10px; }
.card-h h3 { margin:0; font-size:14px; font-weight:700; }
.card-h .sub { font-size:12px; color:#7b8794; font-weight:400; }
.card-b { padding:16px; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; border:1px solid #cbd4de; background:#fff; color:#1b2733; padding:7px 13px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; }
.btn:hover { background:#f4f7fa; }
.btn.pri { background:#1461d2; border-color:#1461d2; color:#fff; }
.btn.pri:hover { background:#0f4fae; }
.btn.dark { background:#0e1b33; border-color:#0e1b33; color:#fff; }
.btn.sm { padding:4px 9px; font-size:12px; }
.btn.ghost { border-color:transparent; background:transparent; color:#1461d2; }

/* Pipeline path (Sitetracker-style chevrons) */
.path { display:flex; border-radius:7px; overflow:hidden; border:1px solid #d5dde6; margin-bottom:16px; }
.path .st { flex:1; position:relative; padding:10px 8px 10px 22px; font-size:12px; font-weight:600; text-align:center; background:#eef2f6; color:#5b6b7c; cursor:pointer; white-space:nowrap; }
.path .st:after { content:""; position:absolute; right:-11px; top:0; width:0; height:0; border-top:20px solid transparent; border-bottom:20px solid transparent; border-left:11px solid #eef2f6; z-index:2; }
.path .st:before { content:""; position:absolute; right:-13px; top:0; width:0; height:0; border-top:20px solid transparent; border-bottom:20px solid transparent; border-left:11px solid #d5dde6; z-index:1; }
.path .st.done { background:#5a76c9; color:#fff; }
.path .st.done:after { border-left-color:#5a76c9; }
.path .st.cur { background:#0e1b33; color:#fff; }
.path .st.cur:after { border-left-color:#0e1b33; }
.path .st:last-child:after, .path .st:last-child:before { display:none; }

/* Tables */
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#7b8794; padding:8px 10px; border-bottom:1px solid #e4e9ef; font-weight:700; }
td { padding:9px 10px; border-bottom:1px solid #eef2f6; vertical-align:middle; }
tr:hover td { background:#f8fafc; }
.tbl-wrap { overflow:auto; }

/* Detail grid */
.dl { display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
.dl .fld label { display:block; font-size:11px; color:#7b8794; text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
.dl .fld .val { font-size:13px; color:#1b2733; }
.section-h { font-size:12px; font-weight:700; color:#3a4a5c; margin:18px 0 8px; padding-bottom:5px; border-bottom:1px solid #edf1f5; display:flex; align-items:center; gap:6px; }

/* Badges/pills */
.pill { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; }
.pill.blue { background:#e3efff; color:#1461d2; }
.pill.green { background:#e2f5ea; color:#137a44; }
.pill.amber { background:#fff2d9; color:#9a6800; }
.pill.red { background:#fde3e3; color:#b42323; }
.pill.gray { background:#eceff3; color:#5b6b7c; }
.risk { width:14px; height:14px; border-radius:3px; display:inline-block; vertical-align:middle; }

/* Inputs */
input, select, textarea { font-family:inherit; font-size:13px; padding:8px 10px; border:1px solid #cbd4de; border-radius:7px; width:100%; background:#fff; }
input:focus, select:focus, textarea:focus { outline:none; border-color:#1461d2; box-shadow:0 0 0 3px rgba(20,97,210,.12); }
label.f { display:block; font-size:11px; color:#7b8794; text-transform:uppercase; letter-spacing:.4px; margin:0 0 4px; }
.form-row { margin-bottom:13px; }

/* Modal */
.ov { position:fixed; inset:0; background:rgba(14,27,51,.5); display:none; align-items:flex-start; justify-content:center; z-index:100; padding:40px 16px; overflow:auto; }
.ov.on { display:flex; }
.modal { background:#fff; border-radius:12px; width:100%; max-width:560px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
.modal-h { padding:16px 20px; border-bottom:1px solid #edf1f5; display:flex; align-items:center; }
.modal-h h3 { margin:0; font-size:16px; }
.modal-h .x { margin-left:auto; cursor:pointer; color:#7b8794; font-size:20px; line-height:1; }
.modal-b { padding:20px; }
.modal-f { padding:14px 20px; border-top:1px solid #edf1f5; display:flex; gap:10px; justify-content:flex-end; }

/* Sub-tabs */
.subtabs { display:flex; gap:2px; border-bottom:1px solid #e4e9ef; margin-bottom:16px; }
.subtabs a { padding:9px 15px; font-size:13px; font-weight:600; color:#5b6b7c; border-bottom:2px solid transparent; }
.subtabs a.on { color:#1461d2; border-bottom-color:#1461d2; }

/* KPI strip */
.kpis { display:flex; gap:14px; margin-bottom:18px; }
.kpi { flex:1; background:#fff; border:1px solid #dde3ea; border-radius:10px; padding:14px 16px; }
.kpi .n { font-size:26px; font-weight:800; color:#0e1b33; }
.kpi .l { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#7b8794; margin-top:2px; }

/* Map placeholder */
.map { border-radius:8px; overflow:hidden; border:1px solid #dde3ea; background:#dfe6ec; position:relative; height:230px; }
.map .mtag { position:absolute; left:10px; top:10px; background:rgba(255,255,255,.9); padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; }

.muted { color:#7b8794; }
.empty { text-align:center; padding:40px 20px; color:#98a4b2; font-size:13px; }
.flex { display:flex; align-items:center; gap:10px; }
.spacer { flex:1; }
.small { font-size:12px; }
.tag-src { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:700; letter-spacing:.3px; }
.tag-src.repo { background:#e3efff; color:#1461d2; }
.tag-src.monday { background:#ffe6d6; color:#c8531a; }
.toast { position:fixed; bottom:22px; right:22px; background:#0e1b33; color:#fff; padding:12px 18px; border-radius:9px; font-size:13px; box-shadow:0 8px 30px rgba(0,0,0,.3); z-index:200; display:none; }
.toast.on { display:block; }
.loading { padding:40px; text-align:center; color:#7b8794; }
.ent-lock { background:#fff7e6; border:1px solid #f0d492; border-radius:8px; padding:10px 14px; font-size:12px; color:#8a6400; margin-bottom:16px; }
</style>
</head>
<body>

<div class="tb">
  <img src="/clearsky-omega-mark-white.png" alt="OMEGA" class="tb-omega">
  <span class="tb-logo-txt">Clear<span>Sky</span> OMEGA</span>
  <div class="tb-sep"></div>
  <span class="tb-ws">Site Lifecycle Console &nbsp;·&nbsp; <b id="wsName">Loading…</b></span>
  <div class="tb-right">
    <button id="syncBtn" class="btn sm" style="background:#12233f;border-color:#2a3c5c;color:#cfe0ff" onclick="UI.openSync()">⟳ Sync to CRM</button>
    <span class="tb-badge">ENTERPRISE</span>
    <span id="userEmail">—</span>
    <div class="tb-user" id="userInitial">?</div>
  </div>
</div>

<div class="nav" id="nav">
  <a data-mod="sites" class="on">Sites &amp; Candidates</a>
  <a data-mod="leases">Leases</a>
  <a data-mod="assets">Assets &amp; Inventory</a>
  <a data-mod="permits">Permits</a>
  <a data-mod="settings" style="margin-left:auto">⚙ Settings</a>
</div>

<div class="wrap" id="app">
  <div class="loading">Connecting to workspace…</div>
</div>

<!-- Modal -->
<div class="ov" id="ov">
  <div class="modal">
    <div class="modal-h"><h3 id="ovTitle">—</h3><span class="x" onclick="UI.closeModal()">&times;</span></div>
    <div class="modal-b" id="ovBody"></div>
    <div class="modal-f" id="ovFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase compat v8 -->
<!-- ClearSky config (Firebase + Maps keys). Optional: inline fallback exists. -->
<script src="/config.js"></script>
<!-- Firebase compat v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
/* ============================================================
   ClearSky OMEGA — Site Lifecycle Console
   Enterprise-only. Namespace: slc_*
   ES5-only, no build step. Firebase compat v8.
   ============================================================ */
(function () {
  "use strict";

  window.onerror = function(msg){
    var app = document.getElementById("app");
    if(app && app.querySelector(".loading")){
      app.innerHTML = '<div class="card"><div class="card-b"><h3>Something went wrong</h3><p class="muted small">'+String(msg)+'</p><p class="muted small">If this persists, it\'s usually a Firebase config issue — check the console.</p></div></div>';
    }
    return false;
  };

  /* ---- Firebase config: shared clearsky-portal project ----
     Matches the Solela/SPATCO convention: prefer window.CLEARSKY_CONFIG
     (loaded from /config.js in the repo). Falls back to the inline values
     below if config.js isn't present, so the tool works either way. ---- */
  var CSCONFIG = (typeof window !== "undefined" && window.CLEARSKY_CONFIG) ? window.CLEARSKY_CONFIG : null;

  var FB = (CSCONFIG && CSCONFIG.firebase) ? CSCONFIG.firebase : {
    apiKey: "AIzaSyABoM1lgOYUnd5ZadaoTMhYmA9cHa8Tyo0",
    authDomain: "clearsky-portal.firebaseapp.com",
    projectId: "clearsky-portal",
    storageBucket: "clearsky-portal.firebasestorage.app",
    messagingSenderId: "742134484347",
    appId: "1:742134484347:web:ab0f95fd221536158481de"
  };

  /* Google Maps key — from config.js if present, else the shared key. */
  var MAPS_KEY = (CSCONFIG && CSCONFIG.googleMapsKey) ? CSCONFIG.googleMapsKey : "AIzaSyC0roZ_qMwtbVzqRLtNx9nrCeaGqrE1sNs";

  /* ---- Enterprise workspaces (email domain -> config) ----
     Only these domains may load this deluxe tool. Others are locked out. */
  var WORKSPACES = {
    "nextnrg.com":     { orgId: "nextnrg",   name: "NextNRG",          enterprise: true },
    "csebuilders.com": { orgId: "clearsky",  name: "ClearSky (Admin)", enterprise: true },
    "clearsky-usa.com":{ orgId: "clearsky",  name: "ClearSky (Admin)", enterprise: true }
  };

  /* ---- AHJ tool link (stubbed — separate non-enterprise offering) ---- */
  var AHJ_TOOL_URL = "https://ahj.csebuilders.com"; // TODO: live when AHJ tool ships

  /* ---- Monday.com link stub ---- */
  var MONDAY_BASE = "https://monday.com/boards/"; // project.mondayBoardId appended

  /* ---- CRM sync: secure serverless proxy endpoint ----
     The proxy holds each customer's CRM credentials server-side. The browser
     NEVER stores or reads the token. Settings UI sends credentials to the proxy
     (action:"save_credentials"); Firestore only holds non-secret metadata. ---- */
  var CRM_PROXY_URL = "https://tools.csebuilders.com/api/crm-sync"; // TODO: your serverless route

  /* Supported CRMs and the credential fields each needs.
     'secret:true' fields are sent to the proxy and never persisted client-side. */
  var CRM_PROVIDERS = {
    monday: { label:"Monday.com", fields:[
      { key:"apiToken", label:"API Token", secret:true, ph:"eyJhbGci…" }
    ], note:"Create a token in Monday → Admin → API." },
    salesforce: { label:"Salesforce", fields:[
      { key:"instanceUrl", label:"Instance URL", ph:"https://yourco.my.salesforce.com" },
      { key:"clientId", label:"Consumer Key", secret:true },
      { key:"clientSecret", label:"Consumer Secret", secret:true },
      { key:"refreshToken", label:"Refresh Token", secret:true }
    ], note:"From a Connected App (OAuth). Tokens are stored server-side only." },
    hubspot: { label:"HubSpot", fields:[
      { key:"accessToken", label:"Private App Token", secret:true, ph:"pat-na1-…" }
    ], note:"Create a Private App in HubSpot → Settings → Integrations." },
    zoho: { label:"Zoho CRM", fields:[
      { key:"dataCenter", label:"Data Center", ph:"com / eu / in / com.au" },
      { key:"clientId", label:"Client ID", secret:true },
      { key:"clientSecret", label:"Client Secret", secret:true },
      { key:"refreshToken", label:"Refresh Token", secret:true }
    ], note:"From a Self Client in Zoho API Console." }
  };

  /* OMEGA fields available to map, per record type. */
  var CRM_FIELDS = {
    candidates: ["name","stage","siteType","viability","landlord","city","address","description"],
    leases:     ["name","number","type","status","landlordCompany","commence","end","termMonths","rent"],
    assets:     ["name","item","serial","status","category","installDate","qty"],
    permits:    ["name","type","stage","status","risk","ahjName","agency","issuanceForecast","cost","program"]
  };

  /* ---- Pipeline definitions ---- */
  var CAND_STAGES  = ["New","Cultivate","In Evaluation","Future Opportunity","Dead","Selected"];
  var PERMIT_STAGES= ["Not Started","Submitted","In Progress","Cancelled","Received"];

  var db, auth, USER = null, WS = null;
  var STATE = { mod: "sites", sel: {}, cache: {} };

  /* ================= util ================= */
  function $(id){ return document.getElementById(id); }
  function el(tag, cls, html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
  function esc(s){ if(s==null)return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function money(n){ if(n==null||n==="")return "—"; var x=Number(n); if(isNaN(x))return esc(n); return "$"+x.toLocaleString(undefined,{maximumFractionDigits:0}); }
  function fmtDate(d){ if(!d)return "—"; if(d.toDate) d=d.toDate(); var dt=new Date(d); if(isNaN(dt))return esc(d); return (dt.getMonth()+1)+"/"+dt.getDate()+"/"+dt.getFullYear(); }
  function uid(p){ return (p||"id")+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7); }
  function toast(msg){ var t=$("toast"); t.textContent=msg; t.className="toast on"; setTimeout(function(){ t.className="toast"; },2600); }
  function coll(name){ return db.collection("slc_"+name); } // slc_candidates, slc_leases, slc_assets, slc_permits, slc_projects

  var DEMO = false; // set true when Firebase is unavailable / key is placeholder

  /* ================= boot ================= */
  function boot(){
    var keyMissing = !FB.apiKey || FB.apiKey.indexOf("PLACEHOLDER") !== -1;
    if (typeof firebase === "undefined" || keyMissing) {
      return startDemo(keyMissing ? "config" : "sdk");
    }
    try {
      firebase.initializeApp(FB);
      db = firebase.firestore();
      auth = firebase.auth();
    } catch (e) {
      return startDemo("init");
    }
    auth.onAuthStateChanged(function(u){
      if(!u){
        auth.signInAnonymously().catch(function(){ startDemo("auth"); });
        return;
      }
      onUser(u);
    }, function(){ startDemo("auth"); });
  }

  /* Demo mode: in-memory Firestore shim so the console is fully usable
     without a live backend (preview, blocked CDN, or placeholder key). */
  function startDemo(reason){
    DEMO = true;
    db = makeMemDb();
    var banner = { config:"Demo mode — add your Firebase web apiKey to go live.",
                   sdk:"Demo mode — Firebase SDK didn't load (offline or CDN blocked).",
                   init:"Demo mode — Firebase failed to initialize.",
                   auth:"Demo mode — sign-in unavailable." }[reason] || "Demo mode.";
    STATE.demoBanner = banner;
    // simulate an enterprise user
    onUser({ email:"demo@nextnrg.com" });
  }

  /* Minimal in-memory Firestore-compatible shim (only the calls this tool uses). */
  function makeMemDb(){
    var store = {}; // { collName: { docId: data } }
    function collection(name){
      store[name] = store[name] || {};
      return {
        _name:name,
        doc:function(id){ id = id || uid("doc"); return docRef(name,id); },
        where:function(f,op,val){ return query(name,[[f,op,val]]); },
        limit:function(){ return query(name,[]); },
        get:function(){ return query(name,[]).get(); }
      };
    }
    function docRef(name,id){
      return {
        id:id,
        set:function(obj){ store[name][id]=clone(obj); return Promise.resolve(); },
        update:function(patch){ var d=store[name][id]||{}; for(var k in patch) d[k]=patch[k]; store[name][id]=d; return Promise.resolve(); },
        get:function(){ var d=store[name][id]; return Promise.resolve({ exists:!!d, id:id, data:function(){return clone(d);} }); }
      };
    }
    function query(name, conds){
      return {
        where:function(f,op,val){ return query(name, conds.concat([[f,op,val]])); },
        limit:function(){ return this; },
        get:function(){
          var out=[]; var bag=store[name]||{};
          for(var id in bag){
            var row=bag[id], ok=true;
            for(var i=0;i<conds.length;i++){ var c=conds[i]; if(c[1]==="=="&&row[c[0]]!==c[2]){ ok=false; break; } }
            if(ok) out.push({ id:id, data:(function(r){return function(){return clone(r);};})(row) });
          }
          return Promise.resolve({ empty:out.length===0, size:out.length, forEach:function(cb){ out.forEach(cb); } });
        }
      };
    }
    function batch(){
      var ops=[];
      return { set:function(ref,obj){ ops.push(function(){ ref.set(obj); }); },
               commit:function(){ ops.forEach(function(f){f();}); return Promise.resolve(); } };
    }
    function clone(o){ return o==null?o:JSON.parse(JSON.stringify(o)); }
    return { collection:collection, batch:batch };
  }

  function onUser(u){
    USER = u;
    var email = u.email || "demo@nextnrg.com"; // anon fallback demo domain
    var domain = email.split("@")[1] || "";
    WS = WORKSPACES[domain];
    if(!WS){
      // not an enterprise domain -> lock out
      renderLockout(email);
      return;
    }
    if(!WS.enterprise){ renderLockout(email); return; }
    $("wsName").textContent = WS.name + (DEMO ? " · DEMO" : "");
    $("userEmail").textContent = email;
    $("userInitial").textContent = (email[0]||"?").toUpperCase();
    bindNav();
    seedIfEmpty().then(function(){ render(); }).catch(function(e){
      $("app").innerHTML='<div class="card"><div class="card-b"><h3>Couldn\'t load data</h3><p class="muted small">'+esc(String(e&&e.message||e))+'</p></div></div>';
    });
  }

  function renderNoAuth(){
    $("app").innerHTML = '<div class="card"><div class="card-b"><h3>Sign-in required</h3><p class="muted">This console requires an authenticated enterprise account. Anonymous access is unavailable.</p></div></div>';
  }
  function renderLockout(email){
    $("wsName").textContent = "Access Restricted";
    $("userEmail").textContent = email;
    $("app").innerHTML =
      '<div class="card"><div class="card-b" style="text-align:center;padding:50px 20px">'
      + '<div style="font-size:40px">🔒</div>'
      + '<h3 style="margin:12px 0 6px">Enterprise Console</h3>'
      + '<p class="muted">The Site Lifecycle Console is a deluxe offering available to enterprise accounts only.</p>'
      + '<p class="muted small">Your domain (<b>'+esc(email.split("@")[1]||"")+'</b>) is not provisioned for this tool.</p>'
      + '<p style="margin-top:18px"><a class="btn" href="'+AHJ_TOOL_URL+'" target="_blank">Explore the AHJ Lookup tool →</a></p>'
      + '</div></div>';
  }

  function bindNav(){
    var links = $("nav").getElementsByTagName("a");
    for(var i=0;i<links.length;i++){
      (function(a){
        a.onclick=function(){
          for(var j=0;j<links.length;j++) links[j].className="";
          a.className="on";
          STATE.mod=a.getAttribute("data-mod");
          STATE.sel={};
          render();
        };
      })(links[i]);
    }
  }

  /* ================= seed demo data (first run only) ================= */
  function seedIfEmpty(){
    var org = WS.orgId;
    return coll("projects").where("orgId","==",org).limit(1).get().then(function(s){
      if(!s.empty) return;
      var batch = db.batch();
      // demo projects: one from repo/editor, one linked to Monday
      var p1 = coll("projects").doc(uid("prj"));
      batch.set(p1, { orgId:org, name:"Winnipeg BESS — Fort St", source:"repo", editorProjectId:"editor_wpg_001", address:"252 Fort St, Winnipeg", createdAt:Date.now() });
      var p2 = coll("projects").doc(uid("prj"));

  /* ================= data loaders ================= */
  function loadProjects(){
    if(STATE.cache.projects) return Promise.resolve(STATE.cache.projects);
    return coll("projects").where("orgId","==",WS.orgId).get().then(function(s){
      var arr=[]; s.forEach(function(d){ var o=d.data(); o.id=d.id; arr.push(o); });
      STATE.cache.projects=arr; return arr;
    });
  }
  function loadColl(name){
    return coll(name).where("orgId","==",WS.orgId).get().then(function(s){
      var arr=[]; s.forEach(function(d){ var o=d.data(); o.id=d.id; arr.push(o); });
      arr.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
      return arr;
    });
  }
  function projName(id){ var p=(STATE.cache.projects||[]).filter(function(x){return x.id===id;})[0]; return p?p.name:"—"; }
  function projObj(id){ return (STATE.cache.projects||[]).filter(function(x){return x.id===id;})[0]; }

  /* ================= render dispatch ================= */
  function render(){
    $("app").innerHTML='<div class="loading">Loading '+STATE.mod+'…</div>';
    loadProjects().then(function(){
      if(STATE.mod==="sites")   renderSites();
      else if(STATE.mod==="leases") renderLeases();
      else if(STATE.mod==="assets") renderAssets();
      else if(STATE.mod==="permits")renderPermits();
      else if(STATE.mod==="settings")renderSettings();
    });
  }

  function mapImg(lat,lng){

    var url="https://maps.googleapis.com/maps/api/staticmap?center="+lat+","+lng+"&zoom=18&size=900x230&maptype=satellite&markers=color:blue%7C"+lat+","+lng+"&key="+MAPS_KEY;
    return '<img src="'+url+'" style="width:100%;height:100%;object-fit:cover" alt="map" onerror="this.style.display=\'none\';this.parentNode.innerHTML+=\'<div class=&quot;empty&quot;>Map key not configured (lat '+lat+', lng '+lng+')</div>\'">';
  }

  /* ================= CRM SYNC (multi-provider) =================
     Security model:
       - Firestore (slc_crm_config/{orgId}) holds NON-secret metadata only:
         which provider is active, whether creds are configured, board/object
         targets, and field->column mappings.
       - Actual CRM credentials/tokens are POSTed to the serverless proxy
         (action:"save_credentials") and stored SERVER-SIDE only. The browser
         and Firestore never persist the secret.
       - Sync (action:"sync") sends records + mapping; proxy uses the stored
         creds to push into the customer's CRM. */

  function crmConfigRef(){ return coll("crm_config").doc(WS.orgId); }

  function loadCrmConfig(){
    if(STATE.cache.crmConfig) return Promise.resolve(STATE.cache.crmConfig);
    return crmConfigRef().get().then(function(d){
      var cfg = d.exists ? d.data() : { orgId:WS.orgId, provider:"", credsConfigured:false, target:{}, columns:{} };
      STATE.cache.crmConfig = cfg;
      return cfg;
    });
  }

  function crmReady(cfg){
    return !!(cfg && cfg.provider && cfg.credsConfigured);
  }

  /* ---------------- SETTINGS PAGE ---------------- */

      cfg.target = cfg.target || {}; cfg.columns = cfg.columns || {};

      // provider picker
      h+='<div class="card"><div class="card-h"><h3>CRM Integration</h3><span class="sub">Choose your CRM &amp; connect securely</span>';
      h+='<div class="spacer"></div>';
      if(crmReady(cfg)) h+='<span class="pill green">Connected: '+esc(CRM_PROVIDERS[prov]?CRM_PROVIDERS[prov].label:prov)+'</span>';
      else h+='<span class="pill gray">Not connected</span>';
      h+='</div><div class="card-b">';

      h+='<label class="f">CRM Provider</label>';
      h+='<div class="flex" style="flex-wrap:wrap;gap:8px;margin-bottom:8px">';
      var pk;
      for(pk in CRM_PROVIDERS){
        var on = pk===prov;
        h+='<button class="btn'+(on?' dark':'')+'" onclick="UI.crmPickProvider(\''+pk+'\')">'+esc(CRM_PROVIDERS[pk].label)+'</button>';
      }
      h+='</div>';

      if(prov && CRM_PROVIDERS[prov]){
        var P = CRM_PROVIDERS[prov];
        h+='<div class="section-h">Credentials — '+esc(P.label)+'</div>';
        h+='<div class="ent-lock" style="background:#eef7ff;border-color:#bcdcff;color:#1461d2">🔒 Credentials are sent to your secure server and stored server-side. They are never saved in the browser or database.</div>';
        h+='<p class="small muted">'+esc(P.note||"")+'</p>';
        P.fields.forEach(function(fd){
          var val = (fd.secret ? "" : ((cfg.target && cfg.target[fd.key]) || ""));
          var ph = fd.ph ? ' placeholder="'+esc(fd.ph)+'"' : '';
          var type = fd.secret ? ' type="password" autocomplete="new-password"' : '';
          var hint = fd.secret ? ' <span class="small muted">(write-only — leave blank to keep existing)</span>' : '';
          h+='<div class="form-row"><label class="f">'+esc(fd.label)+hint+'</label><input id="crm_'+esc(fd.key)+'"'+type+ph+' value="'+esc(val)+'"></div>';
        });
        h+='<div class="flex"><button class="btn pri" onclick="UI.crmSaveCreds(\''+prov+'\')">Save &amp; Connect</button>';
        if(crmReady(cfg)) h+='<button class="btn" onclick="UI.crmTest()">Test Connection</button>';
        h+='<button class="btn" onclick="UI.crmDisconnect()">Disconnect</button></div>';
      } else {
        h+='<p class="muted">Select a provider above to enter credentials.</p>';
      }
      h+='</div></div>';

      // field mapping (only once a provider is chosen)
      if(prov){
        h+='<div class="card" style="margin-top:16px"><div class="card-h"><h3>Field Mapping</h3><span class="sub">OMEGA field → your CRM field/column</span></div><div class="card-b">';
        h+='<p class="small muted" style="margin-top:0">For each record type, set the CRM target (board/object) and map fields. For Monday use column IDs; for Salesforce/HubSpot/Zoho use API field names.</p>';
        h+='<div class="subtabs" id="mapTabs">';
        [["candidates","Candidates"],["leases","Leases"],["assets","Assets"],["permits","Permits"]].forEach(function(t,i){
          h+='<a data-t="'+t[0]+'"'+(i===0?' class="on"':'')+'>'+t[1]+'</a>';
        });
        h+='</div><div id="mapPane"></div>';
        h+='<div style="margin-top:14px"><button class="btn pri" onclick="UI.crmSaveMapping()">Save Mapping</button></div>';
        h+='</div></div>';
      }

      $("app").innerHTML=h;

          var m='';
          m+=frow(targetLabel, '<input id="map_target_'+type+'" value="'+esc((cfg.target[type]||""))+'" placeholder="'+(prov==="monday"?"7712345001":"e.g. Site__c")+'">');

  function crmPickProvider(pk){
    loadCrmConfig().then(function(cfg){

  function crmSaveCreds(prov){
    var P=CRM_PROVIDERS[prov]; if(!P) return;
    var creds={}, target={};
    P.fields.forEach(function(fd){
      var e=$("crm_"+fd.key); if(!e) return;
      var v=e.value.trim();
      if(fd.secret){ if(v) creds[fd.key]=v; }        // secrets → proxy only
      else { if(v) target[fd.key]=v; }               // non-secret → firestore ok
    });

    if(DEMO){
      var cfgD=STATE.cache.crmConfig||{}; cfgD.provider=prov; cfgD.credsConfigured=true;
      cfgD.target=cfgD.target||{}; for(var k in target) cfgD.target[k]=target[k];
      STATE.cache.crmConfig=cfgD;
      crmConfigRef().set(cfgD).then(function(){ toast("Connected (demo)"); renderSettings(); });
      return;
    }

    toast("Connecting…");
    fetch(CRM_PROXY_URL, {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ action:"save_credentials", orgId:WS.orgId, provider:prov, credentials:creds, target:target, user:(USER&&USER.email)||"" })
    }).then(function(r){ return r.json(); }).then(function(res){
      if(res && res.ok){
        var cfg=STATE.cache.crmConfig||{}; cfg.provider=prov; cfg.credsConfigured=true;
        cfg.target=cfg.target||{}; for(var k in target) cfg.target[k]=target[k];
        STATE.cache.crmConfig=cfg;
        // Firestore stores metadata only (no secrets)
        crmConfigRef().set(cfg).then(function(){ toast("Connected"); renderSettings(); });
      } else {
        toast("Connect failed: "+((res&&res.error)||"unknown"));
      }
    }).catch(function(e){ toast("Connect failed: "+String(e&&e.message||e)); });
  }

  function crmTest(){
    if(DEMO){ toast("Connection OK (demo)"); return; }
    toast("Testing…");
    fetch(CRM_PROXY_URL, { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ action:"test", orgId:WS.orgId }) })
      .then(function(r){ return r.json(); })
      .then(function(res){ toast(res&&res.ok ? "Connection OK":"Failed: "+((res&&res.error)||"")); })
      .catch(function(e){ toast("Failed: "+String(e&&e.message||e)); });
  }

  function crmDisconnect(){
    if(!confirm("Disconnect CRM? Stored credentials will be cleared from the server.")) return;
    var cfg=STATE.cache.crmConfig||{};
    function finish(){ cfg.credsConfigured=false; STATE.cache.crmConfig=cfg; crmConfigRef().set(cfg).then(function(){ toast("Disconnected"); renderSettings(); }); }
    if(DEMO){ finish(); return; }
    fetch(CRM_PROXY_URL, { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ action:"delete_credentials", orgId:WS.orgId }) })
      .then(function(){ finish(); }).catch(function(){ finish(); });
  }

  function crmSaveMapping(){
    var cfg=STATE.cache.crmConfig||{}; cfg.target=cfg.target||{}; cfg.columns=cfg.columns||{};
    var types=["candidates","leases","assets","permits"];
    // read whichever pane is currently painted plus preserve others already in cfg
    types.forEach(function(type){
      var t=$("map_target_"+type); if(t) cfg.target[type]=t.value.trim();
      cfg.columns[type]=cfg.columns[type]||{};
      CRM_FIELDS[type].forEach(function(f){
        var e=$("map_col_"+type+"_"+f); if(e) cfg.columns[type][f]=e.value.trim();
      });
    });
    cfg.orgId=WS.orgId; cfg.updatedAt=Date.now();
    crmConfigRef().set(cfg).then(function(){ STATE.cache.crmConfig=cfg; toast("Mapping saved"); });
  }

  /* ---------------- SYNC (button in topbar) ---------------- */
  function gatherSyncPayload(){
    return Promise.all([
      loadColl("candidates"), loadColl("leases"), loadColl("assets"), loadColl("permits")
    ]).then(function(res){
      var types = { candidates:res[0], leases:res[1], assets:res[2], permits:res[3] };
      var out = { candidates:[], leases:[], assets:[], permits:[] };
      var t;
      for(t in types){
        types[t].forEach(function(r){
          var p = projObj(r.projectId);
          if(p && p.source==="monday" && p.mondayBoardId){ out[t].push(r); }
        });
      }
      return out;
    });
  }

  function openSync(){
    loadCrmConfig().then(function(cfg){
      if(!crmReady(cfg)){
        openModal("Sync to CRM",
          '<p class="muted">No CRM is connected yet. Go to <b>Settings</b> to choose a provider and connect securely.</p>',
          function(){ closeModal(); STATE.mod="settings"; setNavActive("settings"); render(); });
        // relabel save button
        $("ovFoot").innerHTML='';
        var c=el("button","btn","Close"); c.onclick=closeModal;
        var g=el("button","btn pri","Open Settings"); g.onclick=function(){ closeModal(); STATE.mod="settings"; setNavActive("settings"); render(); };
        $("ovFoot").appendChild(c); $("ovFoot").appendChild(g);
        return;
      }
      gatherSyncPayload().then(function(payload){
        var total=payload.candidates.length+payload.leases.length+payload.assets.length+payload.permits.length;
        var provLabel=CRM_PROVIDERS[cfg.provider]?CRM_PROVIDERS[cfg.provider].label:cfg.provider;
        var body='<p class="small muted" style="margin-top:0">Pushing records linked to <b>CRM-mapped projects</b> to <b>'+esc(provLabel)+'</b>.</p>';
        body+='<div class="dl" style="margin:12px 0">';
        body+='<div class="fld"><label>Candidates</label><div class="val">'+payload.candidates.length+'</div></div>';
        body+='<div class="fld"><label>Leases</label><div class="val">'+payload.leases.length+'</div></div>';
        body+='<div class="fld"><label>Assets</label><div class="val">'+payload.assets.length+'</div></div>';
        body+='<div class="fld"><label>Permits</label><div class="val">'+payload.permits.length+'</div></div>';
        body+='</div>';
        body+='<div class="ent-lock" style="background:#e2f5ea;border-color:#a8dcc0;color:#137a44">✓ Connected to '+esc(provLabel)+'. '+total+' record(s) ready.</div>';
        $("ovTitle").textContent="Sync to CRM";
        $("ovBody").innerHTML=body;
        $("ovFoot").innerHTML='';
        var cancel=el("button","btn","Close"); cancel.onclick=closeModal;
        var go=el("button","btn pri","⟳ Sync "+total+" record(s)");
        go.disabled=total===0; if(go.disabled) go.style.opacity="0.5";
        go.onclick=function(){ runSync(cfg,payload); };
        $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go);
        $("ov").className="ov on";
      });
    });
  }

  function runSync(cfg,payload){
    var jobs=[]; var types=["candidates","leases","assets","permits"];
    types.forEach(function(type){
      var target=(cfg.target&&cfg.target[type])||"";
      var colMap=(cfg.columns&&cfg.columns[type])||{};
      payload[type].forEach(function(rec){
        var fields={};
        CRM_FIELDS[type].forEach(function(f){
          var cid=colMap[f];
          if(cid && rec[f]!=null && rec[f]!=="") fields[cid]=String(rec[f]);
        });
        jobs.push({ type:type, target:target, itemName:String(rec.name||rec.id), fields:fields, omegaId:rec.id });
      });
    });
    if(!jobs.length){ toast("Nothing to sync"); return; }

    $("ovBody").innerHTML='<div class="loading">Syncing '+jobs.length+' record(s) to '+esc(CRM_PROVIDERS[cfg.provider]?CRM_PROVIDERS[cfg.provider].label:cfg.provider)+'…</div>';
    $("ovFoot").innerHTML='';

    if(DEMO){
      setTimeout(function(){
        $("ovBody").innerHTML='<div class="ent-lock" style="background:#e2f5ea;border-color:#a8dcc0;color:#137a44">✓ Demo: '+jobs.length+' record(s) would sync. Connect the live proxy to perform the real push.</div>';
        var d=el("button","btn pri","Done"); d.onclick=closeModal; $("ovFoot").appendChild(d);
      },800);
      return;
    }

    fetch(CRM_PROXY_URL, { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ action:"sync", orgId:WS.orgId, provider:cfg.provider, user:(USER&&USER.email)||"", jobs:jobs }) })
    .then(function(r){ return r.json(); }).then(function(res){
      var ok=(res&&res.created)||0, fail=(res&&res.failed)||0;
      var msg=fail? '⚠ '+ok+' synced, '+fail+' failed. '+esc((res&&res.error)||"") : '✓ '+ok+' record(s) synced.';
      var cls=fail? 'background:#fff7e6;border-color:#f0d492;color:#8a6400':'background:#e2f5ea;border-color:#a8dcc0;color:#137a44';
      $("ovBody").innerHTML='<div class="ent-lock" style="'+cls+'">'+msg+'</div>';
      var d=el("button","btn pri","Done"); d.onclick=closeModal; $("ovFoot").appendChild(d);
      toast(fail?"Completed with errors":"Sync complete");
    }).catch(function(e){
      $("ovBody").innerHTML='<div class="ent-lock">✕ Sync failed: '+esc(String(e&&e.message||e))+'<br><span class="small">Check the serverless proxy is deployed and CRM_PROXY_URL is correct.</span></div>';
      var d=el("button","btn","Close"); d.onclick=closeModal; $("ovFoot").appendChild(d);
    });
  }

  function setNavActive(mod){
    var links=$("nav").getElementsByTagName("a");
    for(var i=0;i<links.length;i++) links[i].className = (links[i].getAttribute("data-mod")===mod?"on":"");
  }

  function back(){ render(); }

  /* ================= expose ================= */
  window.UI = {
    openCandidate:openCandidate, newCandidate:newCandidate, editCandidate:editCandidate,
    openLease:openLease, newLease:newLease, editLease:editLease, genDoc:genDoc,
    openAsset:openAsset, newAsset:newAsset, editAsset:editAsset, scanAsset:scanAsset, assetAction:assetAction, logActivity:logActivity,
    openPermit:openPermit, newPermit:newPermit, editPermit:editPermit,
    setStage:setStage, markComplete:markComplete, back:back, closeModal:closeModal,
    openSync:openSync,
    crmPickProvider:crmPickProvider, crmSaveCreds:crmSaveCreds, crmTest:crmTest,
    crmDisconnect:crmDisconnect, crmSaveMapping:crmSaveMapping
  };

  boot();
})();
</script>
</body>
</html>
