(function () {

  var CSCONFIG = (typeof window !== "undefined" && window.CLEARSKY_CONFIG) ? window.CLEARSKY_CONFIG : null;
  var FB = (CSCONFIG && CSCONFIG.firebase) ? CSCONFIG.firebase : {

  var EXCLUSIONS = [

    { key:"ownerCause",    label:"Owner-Caused / Site Access",  hint:"Owner delays, denied site access, load side" }
  ];

  var LD_TYPES = {
    none:      "None (best-efforts)",
    perPoint:  "$ per availability point below guarantee",
    perMwh:    "$ per MWh of lost energy",
    revShare:  "% of lost revenue (make-whole)"

  var CLOCK_STAGES = ["Detected","Acknowledged","Responding","Restored","Cured"];

  var db, auth, USER = null, WS = null;

  /* ================= util ================= */
  function $(id){ return document.getElementById(id); }
  function el(t,c,h){ var e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; }
  function esc(s){ if(s==null)return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function money(n){ if(n==null||n==="")return "—"; var x=Number(n); if(isNaN(x))return esc(n); return "$"+x.toLocaleString(undefined,{maximumFractionDigits:0}); }
  function pct(n,d){ if(n==null)return "—"; return (Number(n)).toFixed(d==null?2:d)+"%"; }
  function num(v,d){ var x=Number(v); return isNaN(x)?(d||0):x; }
  function fmtDate(d){ if(!d)return "—"; if(d.toDate)d=d.toDate(); var dt=new Date(d); if(isNaN(dt))return esc(d); return (dt.getMonth()+1)+"/"+dt.getDate()+"/"+dt.getFullYear(); }
  function fmtDT(ms){ if(!ms)return "—"; var dt=new Date(ms); if(isNaN(dt))return "—"; return (dt.getMonth()+1)+"/"+dt.getDate()+" "+("0"+dt.getHours()).slice(-2)+":"+("0"+dt.getMinutes()).slice(-2); }
  function ago(ms){ if(!ms)return "—"; var s=(Date.now()-ms)/1000; if(s<60)return "just now"; if(s<3600)return Math.floor(s/60)+"m ago"; if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }
  function inHrs(ms){ if(ms<=0)return "now"; var h=ms/3600000; if(h<1)return Math.round(h*60)+"m"; if(h<48)return h.toFixed(1)+"h"; return (h/24).toFixed(1)+"d"; }
  function uid(p){ return (p||"id")+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7); }
  function toast(m){ var t=$("toast"); t.textContent=m; t.className="toast on"; setTimeout(function(){ t.className="toast"; },2600); }
  function coll(name){ return db.collection("sla_"+name); } // sla_contracts, sla_events, sla_breaches
  function DEMOon(){ return DEMO; }

  var DEMO = false;

  /* ================= boot ================= */
  function boot(){
    var keyMissing = !FB.apiKey || FB.apiKey.indexOf("PLACEHOLDER") !== -1;
    if (typeof firebase === "undefined" || keyMissing) return startDemo(keyMissing ? "config" : "sdk");
    try { firebase.initializeApp(FB); db=firebase.firestore(); auth=firebase.auth(); }
    catch(e){ return startDemo("init"); }
    auth.onAuthStateChanged(function(u){
      if(!u){ auth.signInAnonymously().catch(function(){ startDemo("auth"); }); return; }
      onUser(u);
    }, function(){ startDemo("auth"); });
  }
  function startDemo(reason){ DEMO=true; db=makeMemDb(); onUser({ email:"admin@csebuilders.com" }); }

  function makeMemDb(){
    var store={};
    function collection(name){ store[name]=store[name]||{};
      return { _name:name, doc:function(id){ id=id||uid("doc"); return docRef(name,id); },
        where:function(f,op,v){ return query(name,[[f,op,v]]); }, limit:function(){ return query(name,[]); }, get:function(){ return query(name,[]).get(); } }; }
    function docRef(name,id){ return { id:id,
      set:function(o){ store[name][id]=clone(o); return Promise.resolve(); },
      update:function(p){ var d=store[name][id]||{}; for(var k in p)d[k]=p[k]; store[name][id]=d; return Promise.resolve(); },
      get:function(){ var d=store[name][id]; return Promise.resolve({ exists:!!d, id:id, data:function(){return clone(d);} }); } }; }
    function query(name,conds){ return { where:function(f,op,v){ return query(name,conds.concat([[f,op,v]])); }, limit:function(){ return this; },
      get:function(){ var out=[],bag=store[name]||{}; for(var id in bag){ var r=bag[id],ok=true;
        for(var i=0;i<conds.length;i++){ var c=conds[i]; if(c[1]==="=="&&r[c[0]]!==c[2]){ ok=false; break; } }
        if(ok) out.push({ id:id, data:(function(x){return function(){return clone(x);};})(r) }); }
        return Promise.resolve({ empty:out.length===0, size:out.length, forEach:function(cb){ out.forEach(cb); } }); } }; }
    function batch(){ var ops=[]; return { set:function(r,o){ ops.push(function(){ r.set(o); }); }, update:function(r,o){ ops.push(function(){ r.update(o); }); }, commit:function(){ ops.forEach(function(f){f();}); return Promise.resolve(); } }; }
    function clone(o){ return o==null?o:JSON.parse(JSON.stringify(o)); }
    return { collection:collection, batch:batch };
  }

  var OT = window.OMEGATools; var ORG = null;
  function omegaOrgRef(orgId){ return db.collection("omega_orgs").doc(orgId); }
  function workspaceOf(o){ return { orgId:o.orgId, tierLevel:o.tierLevel, unlockedTools:o.unlockedTools||[], requiredTools:o.requiredTools||[], customToolUrls:o.customToolUrls||{} }; }
  function canOpenThisApp(o){ if(!OT)return o.tierLevel>=2; var t=OT.byKey(APP_KEY); if(!t)return o.tierLevel>=2; return OT.isUnlocked(t, workspaceOf(o)); }

  /* ================= loaders ================= */
  function loadColl(name){
    if(STATE.cache[name]) return Promise.resolve(STATE.cache[name]);
    return coll(name).where("orgId","==",WS.orgId).get().then(function(s){
      var arr=[]; s.forEach(function(d){ var o=d.data(); o.id=d.id; arr.push(o); });
      arr.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
      STATE.cache[name]=arr; return arr;
    });
  }
  function invalidate(n){ delete STATE.cache[n]; }
  function contractObj(id){ return (STATE.cache.contracts||[]).filter(function(x){return x.id===id;})[0]; }
  function eventsFor(id){ return (STATE.cache.events||[]).filter(function(e){return e.contractId===id;}); }

  /* ============================================================
     THE ENGINE — contractual availability
     raw availability   = rawUptimeHrs / availableHrs
     excluded downtime  = sum of event.hrs whose cause is excluded by the
                          contract (sched-maint only up to its cap)
     adjusted denom     = availableHrs − excludedHrs
     contractual avail  = (availableHrs − countedDown) / adjustedDenom
     ...i.e. excluded causes are removed from BOTH numerator downtime and
     the denominator, which is how PPAs define "guaranteed availability".
     ============================================================ */
  function computeAvailability(c){
    var evs=eventsFor(c.id);
    var availHrs=num(c.availableHrs, num(c.periodHours,730));
    var totalDown=0, excludedHrs=0, countedDown=0;
    var schedUsed=0, schedCap=num(c.schedMaintCapHrs,0);
    var breakdown=[]; // {cause,label,hrs,excluded}
    var byCause={};
    evs.forEach(function(e){
      var hrs=num(e.hrs); totalDown+=hrs;
      var causeKey=e.cause;
      var isExclKey = (causeKey!=="equipment") && c.exclusions && c.exclusions[causeKey];
      var excludedThis=0;
      if(isExclKey){
        if(causeKey==="schedMaint"){
          // only exclude up to the cap; overflow counts against guarantee
          var room=Math.max(0, schedCap - schedUsed);
          excludedThis=Math.min(hrs, room); schedUsed+=excludedThis;
        } else { excludedThis=hrs; }
      }
      excludedHrs+=excludedThis;
      countedDown+=(hrs-excludedThis);
      byCause[causeKey]=byCause[causeKey]||{ hrs:0, excl:0 };
      byCause[causeKey].hrs+=hrs; byCause[causeKey].excl+=excludedThis;
    });
    var rawAvail = availHrs>0 ? ((availHrs-totalDown)/availHrs*100) : 0;
    var adjDenom = Math.max(1, availHrs-excludedHrs);
    var contractualAvail = ((availHrs-excludedHrs-countedDown)/adjDenom)*100;
    // guard
    if(contractualAvail>100)contractualAvail=100; if(contractualAvail<0)contractualAvail=0;
    var guarantee=num(c.guarantee);
    var shortfall=Math.max(0, guarantee-contractualAvail);
    var meets = contractualAvail>=guarantee;

    // liquidated damages
    var ld=computeLD(c, shortfall, countedDown, evs);

    return { availHrs:availHrs, totalDown:totalDown, excludedHrs:excludedHrs, countedDown:countedDown,
      rawAvail:rawAvail, contractualAvail:contractualAvail, adjDenom:adjDenom, guarantee:guarantee,
      shortfall:shortfall, meets:meets, byCause:byCause, ld:ld, schedUsed:schedUsed, schedCap:schedCap };
  }
  function computeLD(c, shortfall, countedDownHrs, evs){
    var type=c.ldType||"none"; if(type==="none"||shortfall<=0) return { type:type, amount:0, capped:false, cap:0 };
    var amount=0;
    if(type==="perPoint"){ amount=shortfall*num(c.ldRate); }
    else if(type==="perMwh"){ var lostMwh=0; evs.forEach(function(e){ // only counted causes contribute
        var causeKey=e.cause; var excl=(causeKey!=="equipment")&&c.exclusions&&c.exclusions[causeKey];
        if(!excl) lostMwh+=num(e.mwh); }); amount=lostMwh*num(c.ldRate); }
    else if(type==="revShare"){ var lostRev=0; evs.forEach(function(e){ var causeKey=e.cause; var excl=(causeKey!=="equipment")&&c.exclusions&&c.exclusions[causeKey];
        if(!excl) lostRev+=num(e.mwh)*1000*num(c.ppaRate); }); amount=lostRev*(num(c.ldRate)/100); }
    // cap as % of annual contract value proxy = expectedMwh*12*rate... use monthly rev * capPct as guardrail
    var monthlyRev=num(c.expectedMwh)*1000*num(c.ppaRate);
    var cap = monthlyRev * (num(c.ldCapPct,100)/100);
    var capped=false; if(cap>0 && amount>cap){ amount=cap; capped=true; }
    return { type:type, amount:amount, capped:capped, cap:cap };
  }

  /* status helper */
  function contractStatus(c){
    var a=computeAvailability(c);
    if(!a.meets) return "breach";
    // at-risk band: within 0.3 points of guarantee, or margin eroding
    if(a.contractualAvail - a.guarantee <= 0.3) return "risk";
    return "ok";
  }

      +'<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#eceff3" stroke-width="12"/>'
      +'<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="12" stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>'
      +'<div class="lab"><div class="big" style="color:'+color+'">'+val.toFixed(1)+'%</div><div class="sm">contractual</div></div></div>';
  }

  function openContract(id){
    var c=contractObj(id); if(!c)return; STATE.sel.contract=c;
    var a=computeAvailability(c); var st=contractStatus(c); var evs=eventsFor(id);
    var h='<a class="btn sm" onclick="UI.back()">← Back to Obligations</a>';
    h+='<div class="card" style="margin-top:12px"><div class="card-h"><h3>'+esc(c.name)+'</h3><span class="sub">'+esc(c.agreementType)+' · '+esc(c.counterparty||"")+'</span>'

      +'<button class="btn pri sm" onclick="UI.newEvent(\''+c.id+'\')">+ Log Downtime</button></div><div class="card-b">';

    h+='<div class="row">';

    h+='<div class="col" style="max-width:150px;text-align:center">'+gaugeRing(a.contractualAvail, a.guarantee)+'<div class="small muted" style="margin-top:6px">guarantee '+pct(a.guarantee,1)+'</div></div>';
    h+='<div class="col"><div class="kpis" style="margin:0">'
      + kpi(pct(a.rawAvail,2),"Raw Uptime","")
      + kpi(pct(a.contractualAvail,2),"Contractual", a.meets?"good":"bad")
      + kpi(a.excludedHrs.toFixed(1)+"h","Excluded Downtime")
      + kpi(a.countedDown.toFixed(1)+"h","Counted Downtime", a.countedDown>0?"warn":"good")
      + '</div>';
    if(!a.meets) h+='<div class="crit-lock" style="margin-top:12px">⚠ Below guarantee by '+a.shortfall.toFixed(2)+' points. Estimated liquidated damages: <b>'+money(a.ld.amount)+'</b>'+(a.ld.capped?" (capped)":"")+'.</div>';
    else if(st==="risk") h+='<div class="warn-lock" style="margin-top:12px">◷ Margin is thin ('+(a.contractualAvail-a.guarantee).toFixed(2)+' pts). One more equipment event this period could breach.</div>';
    else h+='<div class="ok-lock" style="margin-top:12px">✓ Meeting the '+pct(a.guarantee,1)+' guarantee with '+(a.contractualAvail-a.guarantee).toFixed(2)+' pts of margin.</div>';
    h+='</div></div>';

    /* Availability waterfall — the "why" */
    h+='<div class="section-h">Availability Waterfall — how raw becomes contractual</div>';

  /* ---------------- EARLY WARNING ---------------- */
  /* Project the remaining "downtime budget": how many more counted hours can
     accrue before the guarantee is breached, given exclusions & period hours. */
  function downtimeBudget(c){
    var a=computeAvailability(c);
    // allowed counted downtime for guarantee G on adjusted denom:
    // contractualAvail = (adjDenom - countedDown)/adjDenom >= G/100
    // => countedDown <= adjDenom*(1 - G/100)
    var maxCounted = a.adjDenom*(1 - a.guarantee/100);
    var remaining = maxCounted - a.countedDown;
    return { a:a, maxCounted:maxCounted, remaining:remaining };
  }
  function renderAlerts(){
    var cs=STATE.cache.contracts||[]; var evs=STATE.cache.events||[];
    var breaching=[], atRisk=[];
    cs.forEach(function(c){ var b=downtimeBudget(c); if(!b.a.meets) breaching.push({c:c,b:b}); else if(b.remaining<=8 || (b.a.contractualAvail-b.a.guarantee)<=0.3) atRisk.push({c:c,b:b}); });
    // open events approaching duration where they'd tip a contract
    var openEv=evs.filter(function(e){return e.status==="open";});

    var h=info("Early warning when obligations are at risk of being breached — before the period closes, while there's still time to dispatch.");
    h+='<div class="kpis">'
      + kpi(breaching.length,"Breaching Now", breaching.length?"bad":"good")
      + kpi(atRisk.length,"At Risk", atRisk.length?"warn":"good")
      + kpi(openEv.length,"Open Downtime Events", openEv.length?"warn":"good")
      + '</div>';

    if(breaching.length){
      h+='<div class="card"><div class="card-h"><h3>⚠ Breaching</h3><span class="sub">Below guarantee this period</span></div><div class="card-b">';
      breaching.forEach(function(x){ var a=x.b.a;
        h+='<div class="crit-lock" style="display:flex;align-items:center;gap:12px"><div style="flex:1"><b>'+esc(x.c.name)+'</b> — contractual '+pct(a.contractualAvail,2)+' vs '+pct(a.guarantee,1)+' guarantee ('+a.shortfall.toFixed(2)+' pts short). LD exposure '+money(a.ld.amount)+'.</div><button class="btn sm" onclick="UI.openContract(\''+x.c.id+'\')">Open</button><button class="btn sm danger" onclick="UI.escalate(\''+x.c.id+'\')">Escalate</button></div>';
      });
      h+='</div></div>';
    }
    if(atRisk.length){
      h+='<div class="card"><div class="card-h"><h3>◷ Early Warning</h3><span class="sub">Downtime budget nearly exhausted</span></div><div class="card-b"><div class="tbl-wrap"><table><thead><tr><th>Contract</th><th>Contractual</th><th>Margin</th><th>Downtime Budget Left</th><th></th></tr></thead><tbody>';
      atRisk.forEach(function(x){ var a=x.b.a; var rem=Math.max(0,x.b.remaining);
        h+='<tr><td><a onclick="UI.openContract(\''+x.c.id+'\')"><b>'+esc(x.c.name)+'</b></a></td><td>'+pct(a.contractualAvail,2)+'</td><td><span class="pill amber">+'+(a.contractualAvail-a.guarantee).toFixed(2)+'</span></td><td><b>'+rem.toFixed(1)+'h</b> of counted downtime</td><td style="text-align:right"><button class="btn sm" onclick="UI.escalate(\''+x.c.id+'\')">Alert on-call</button></td></tr>';
      });
      h+='</tbody></table></div><div class="small muted" style="margin-top:10px">"Budget left" = counted downtime hours that can still accrue before the guarantee breaches, given this contract\'s exclusions.</div></div></div>';
    }
    if(openEv.length){
      h+='<div class="card"><div class="card-h"><h3>Open Downtime Clocks</h3><span class="sub">Live events accruing against guarantees</span></div><div class="card-b"><div class="tbl-wrap"><table><thead><tr><th>Contract</th><th>Cause</th><th>Note</th><th>Elapsed</th><th>Treatment</th></tr></thead><tbody>';
      openEv.forEach(function(e){ var c=contractObj(e.contractId); if(!c)return; var causeKey=e.cause; var isExcl=(causeKey!=="equipment")&&c.exclusions&&c.exclusions[causeKey];
        h+='<tr><td class="small"><a onclick="UI.openContract(\''+c.id+'\')">'+esc(c.name)+'</a></td><td>'+causeLabel(causeKey)+'</td><td class="small">'+esc(e.note||"")+'</td><td>'+num(e.hrs)+'h ('+ago(e.start)+')</td><td>'+(isExcl?'<span class="pill green">Excluded</span>':'<span class="pill red">Counts</span>')+'</td></tr>';
      });
      h+='</tbody></table></div></div></div>';
    }
    if(!breaching.length && !atRisk.length && !openEv.length) h+='<div class="ok-lock">✓ All obligations comfortably within guarantee. No early warnings.</div>';

    /* alert routing note */
    h+='<div class="card"><div class="card-h"><h3>Alert Routing</h3><span class="sub">Where breach-risk alerts are delivered</span></div><div class="card-b"><p class="small">Configure Slack / SMS destinations in <a onclick="STATE.mod=\'settings\';render()">Settings</a>. When a contract enters the at-risk band or an open event would tip it, ClearSky posts the alert with the site, shortfall, and remaining downtime budget.</p></div></div>';
    $("app").innerHTML=h;

    body+='<div class="section-h">Liquidated Damages</div>';
    body+='<div class="form-3"><div class="form-row"><label class="f">LD Basis</label><select id="c_ldt">';
    for(var lk in LD_TYPES){ body+='<option value="'+lk+'"'+(c.ldType===lk?" selected":"")+'>'+esc(LD_TYPES[lk])+'</option>'; }
    body+='</select></div><div class="form-row"><label class="f">LD Rate</label><input id="c_ldr" type="number" value="'+num(c.ldRate,0)+'"></div>';
    body+='<div class="form-row"><label class="f">LD Cap (% mo rev)</label><input id="c_ldc" type="number" value="'+num(c.ldCapPct,10)+'"></div></div>';
    body+='<div class="section-h">Exclusions (removed from availability calc)</div>';
    EXCLUSIONS.forEach(function(x){ body+='<label class="chk"><input type="checkbox" id="c_ex_'+x.key+'"'+(exc[x.key]?" checked":"")+'> <b>'+esc(x.label)+'</b> <span class="muted small">— '+esc(x.hint)+'</span></label>'; });
    $("ovTitle").textContent=c.id?"Edit Contract Terms":"Add SLA Contract"; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Save"); go.onclick=function(){
      var exObj={}; EXCLUSIONS.forEach(function(x){ exObj[x.key]=!!($("c_ex_"+x.key)||{}).checked; });
      var o={ orgId:WS.orgId, name:$("c_name").value||"Untitled SLA", counterparty:$("c_cp").value, agreementType:$("c_type").value,
        basis:$("c_basis").value, measureWindow:$("c_win").value, guarantee:num($("c_gar").value,97), periodHours:num($("c_ph").value,730),
        schedMaintCapHrs:num($("c_smc").value,0), ppaRate:num($("c_rate").value,0.1), expectedMwh:num($("c_exp").value,0),
        availableHrs:num($("c_ah").value,730), rawUptimeHrs:num($("c_ruh").value,730), editorProjectId:$("c_pid").value,
        source: $("c_pid").value?"repo":(c.source||"repo"), exclusions:exObj,
        ldType:$("c_ldt").value, ldRate:num($("c_ldr").value,0), ldCapPct:num($("c_ldc").value,10),
        siteName:c.siteName||$("c_name").value, createdAt:c.createdAt||Date.now() };
      if(c.mondayBoardId)o.mondayBoardId=c.mondayBoardId;
      var ref=c.id?coll("contracts").doc(c.id):coll("contracts").doc(uid("ctr"));
      ref.set(o).then(function(){ invalidate("contracts"); closeModal(); STATE.mod="obligations"; render(); toast("Contract saved"); });
    };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }

  function newEvent(contractId){
    var c=contractObj(contractId); if(!c)return;
    var body='<p class="small muted" style="margin-top:0">Log a downtime event. Its cause determines whether it counts against the guarantee or is excluded per this contract.</p>';
    body+='<div class="form-row"><label class="f">Cause</label><select id="e_cause"><option value="equipment">Equipment (counts)</option>';
    EXCLUSIONS.forEach(function(x){ var on=c.exclusions&&c.exclusions[x.key]; body+='<option value="'+x.key+'">'+esc(x.label)+(on?" (excluded here)":" (not excluded here → counts)")+'</option>'; });
    body+='</select></div>';
    body+='<div class="form-2"><div class="form-row"><label class="f">Downtime (hrs)</label><input id="e_hrs" type="number" step="0.1" value="1"></div>';
    body+='<div class="form-row"><label class="f">Energy Lost (MWh)</label><input id="e_mwh" type="number" step="0.1" value="0"></div></div>';
    body+='<div class="form-row"><label class="f">Note</label><input id="e_note" placeholder="e.g. Inverter 3 fault"></div>';
    body+='<div class="form-2"><div class="form-row"><label class="f">Status</label><select id="e_status"><option value="open">Open (accruing)</option><option value="resolved">Resolved</option></select></div>';
    body+='<div class="form-row"><label class="f">Start</label><input id="e_start" type="date"></div></div>';
    $("ovTitle").textContent="Log Downtime — "+c.name; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Log Event"); go.onclick=function(){
      var startVal=$("e_start").value; var startMs=startVal?new Date(startVal).getTime():Date.now();
      var o={ orgId:WS.orgId, contractId:contractId, cause:$("e_cause").value, hrs:num($("e_hrs").value,0),
        mwh:num($("e_mwh").value,0), note:$("e_note").value, status:$("e_status").value, start:startMs, end:startMs+num($("e_hrs").value,0)*3600000, createdAt:Date.now() };
      coll("events").doc(uid("evt")).set(o).then(function(){ invalidate("events"); closeModal(); openContract(contractId); toast("Downtime logged"); });
    };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }

  function recordBreach(contractId){
    var c=contractObj(contractId); if(!c)return; var a=computeAvailability(c);
    var period=new Date(); var pStr=period.getFullYear()+"-"+("0"+(period.getMonth()+1)).slice(-2);
    var o={ orgId:WS.orgId, contractId:contractId, siteName:c.siteName||c.name, period:pStr,
      guaranteeAt:a.guarantee, achievedAt:a.contractualAvail, shortfall:a.shortfall, ldType:c.ldType, ldAmount:a.ld.amount,
      status:"Open", openedAt:Date.now(), note:"Auto-recorded from availability engine.",
      log:[{t:Date.now(),m:"Period recorded: "+a.contractualAvail.toFixed(2)+"% vs "+a.guarantee.toFixed(1)+"% guarantee ("+a.shortfall.toFixed(2)+" pts short)"},
           {t:Date.now(),m:"LD computed at "+money(a.ld.amount)+" ("+(LD_TYPES[c.ldType]||c.ldType)+")"+(a.ld.capped?" — capped":"")}],
      createdAt:Date.now() };
    coll("breaches").doc(uid("brc")).set(o).then(function(){ invalidate("breaches"); STATE.mod="ledger"; render(); toast("Breach recorded to ledger"); });
  }

  function breachStatus(id){
    var b=(STATE.cache.breaches||[]).filter(function(x){return x.id===id;})[0]; if(!b)return;
    var body='<div class="form-row"><label class="f">Status</label><select id="bs_sel">';
    ["Open","Acknowledged","Invoiced","Cured","Waived"].forEach(function(s){ body+='<option'+(b.status===s?" selected":"")+'>'+s+'</option>'; });
    body+='</select></div><div class="form-row"><label class="f">Note (added to audit trail)</label><input id="bs_note" placeholder="Optional"></div>';
    $("ovTitle").textContent="Update Breach Status"; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Update"); go.onclick=function(){
      var ns=$("bs_sel").value; var note=$("bs_note").value; var log=(b.log||[]).slice();
      log.push({ t:Date.now(), m:"Status → "+ns+(note?(" · "+note):"") }); b.status=ns; b.log=log;
      persist("breaches", id, { status:ns, log:log }, function(){ closeModal(); openBreach(id); toast("Status updated"); });
    };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }
  function addBreachNote(id){
    var v=($("brcNote")||{}).value||""; if(!v.trim())return;
    var b=(STATE.cache.breaches||[]).filter(function(x){return x.id===id;})[0]; if(!b)return;
    var log=(b.log||[]).slice(); log.push({ t:Date.now(), m:v.trim() }); b.log=log;
    persist("breaches", id, { log:log }, function(){ openBreach(id); });
  }

  function escalate(contractId){
    var c=contractObj(contractId); if(!c)return;
    if(DEMO){ toast("Demo: alert would post to Slack/SMS on-call"); return; }
    fetch(ALERT_PROXY_URL,{ method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ action:"alert", orgId:WS.orgId, kind:"sla_risk", contract:c.name, user:(USER&&USER.email)||"" }) })
      .then(function(){ toast("On-call notified"); }).catch(function(){ toast("Alert failed — check O&M Console proxy"); });
  }

  /* ---------------- COMPLIANCE CERTIFICATE ---------------- */
  function openCert(){
    var cs=STATE.cache.contracts||[]; var rows='';
    cs.forEach(function(c){ var a=computeAvailability(c);
      rows+='<tr><td>'+esc(c.name)+'</td><td>'+pct(a.guarantee,1)+'</td><td>'+pct(a.rawAvail,2)+'</td><td>'+pct(a.contractualAvail,2)+'</td><td>'+(a.meets?'<span class="pill green">Compliant</span>':'<span class="pill red">Breach</span>')+'</td><td>'+money(a.ld.amount)+'</td></tr>'; });
    var body='<p class="small muted" style="margin-top:0">'+esc(COMPANY)+' · '+esc(WS.orgId)+' · issued '+fmtDate(Date.now())+'</p>';
    body+='<div class="tbl-wrap"><table><thead><tr><th>Contract</th><th>Guarantee</th><th>Raw</th><th>Contractual</th><th>Status</th><th>LD</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    body+='<div class="ok-lock" style="margin-top:12px">✓ Certificate reflects contract-adjusted availability with all exclusion determinations. Export to PDF/XLS or attach to the owner report.</div>';
    $("ovTitle").textContent="SLA Compliance Certificate"; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var c=el("button","btn","Close"); c.onclick=closeModal;
    var pdf=el("button","btn","⤓ PDF"); pdf.onclick=function(){ toast(DEMO?"Demo: PDF stubbed":"Generating PDF…"); };
    var xls=el("button","btn pri","⤓ CSV"); xls.onclick=exportCsv;
    $("ovFoot").appendChild(c); $("ovFoot").appendChild(pdf); $("ovFoot").appendChild(xls); $("ov").className="ov on";
  }
  function exportCsv(){
    var cs=STATE.cache.contracts||[];
    var lines=["Contract,Counterparty,Type,Basis,Guarantee %,Raw Uptime %,Contractual %,Margin,Excluded Hrs,Counted Hrs,Status,LD $"];
    cs.forEach(function(c){ var a=computeAvailability(c);
      lines.push([q(c.name),q(c.counterparty),q(c.agreementType),q(c.basis),a.guarantee,a.rawAvail.toFixed(2),a.contractualAvail.toFixed(2),(a.contractualAvail-a.guarantee).toFixed(2),a.excludedHrs.toFixed(1),a.countedDown.toFixed(1),(a.meets?"Compliant":"Breach"),a.ld.amount.toFixed(0)].join(",")); });
    function q(x){ x=String(x||""); return /[",]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x; }
    var blob=new Blob([lines.join("\n")],{type:"text/csv"}); var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download="sla-compliance-"+WS.orgId+".csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast("CSV exported");
  }

  function closeModal(){ $("ov").className="ov"; }
  function back(){ STATE.sel={}; render(); }

  /* ================= expose ================= */
  window.UI = {
    openContract:openContract, newContract:newContract, editContract:editContract,
    newEvent:newEvent, recordBreach:recordBreach, openBreach:openBreach, breachStatus:breachStatus, addBreachNote:addBreachNote,
    escalate:escalate, openCert:openCert, exportCsv:exportCsv,
    back:back, closeModal:closeModal
  };
  window.STATE = STATE; window.render = render; // for inline settings link

  boot();
})();
</script>
</body>
</html>
