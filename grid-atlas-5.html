  Full-screen grid explorer + pin-drop interconnect scoring over public data:
  HIFLD/ArcGIS substations·transmission·plants, OSM power network (Overpass) with
  OpenInfraMap voltage styling, and EIA-860M operable generators (MW bubbles +

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="author" content="Tommy Gilmer · ClearSky Energy Solutions LLC">
<meta name="copyright" content="© 2025 ClearSky Energy Solutions LLC. Proprietary.">
<title>Grid Atlas · ClearSky-OMEGA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root{
    --bg:#0a0e14; --panel:#0f1620; --panel2:#131c28; --line:#1e2b3a;
    --ink:#e6edf3; --muted:#7d8fa3; --dim:#4a5a6b;
    --amp:#ffb020;        /* interconnect amber - signature */
    --tx:#ff5c3a;         /* transmission */
    --sub:#ffb020;        /* substations */
    --plant:#38d9c4;      /* generation */
    --dc:#a78bfa;         /* data centers */
    --ev:#4ea3ff;         /* ev chargers */
    --bess:#6ee76e;       /* storage */
    --ok:#6ee76e; --warn:#ffb020; --bad:#ff5c3a;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden}
  #map{position:absolute;top:60px;left:0;right:0;bottom:0;background:#070a0f}
  .leaflet-container{background:#070a0f;font-family:var(--sans)}

  /* OMEGA standard topbar */
  #topbar{position:absolute;top:0;left:0;right:0;height:60px;z-index:1200;
    display:flex;align-items:center;gap:16px;padding:0 20px;
    background:#0B1E35;border-bottom:1px solid rgba(255,255,255,.08)}
  .tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .tb-omega{height:24px;width:auto;display:block}
  .tb-logo-txt{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.2px}
  .tb-logo-txt span{color:var(--cs-gold,#E8C56A)}
  .tb-sep{width:1px;height:24px;background:rgba(255,255,255,.12)}
  .tb-portal{color:rgba(255,255,255,.45);font-size:12px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
  .tb-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#4ADE80;
    background:rgba(29,185,84,.14);border:1px solid rgba(29,185,84,.3);padding:4px 10px;border-radius:20px}
  .tb-title{color:rgba(255,255,255,.85);font-size:13px;font-weight:600;letter-spacing:.02em;padding-left:4px}
  .tb-spacer{flex:1}
  .tb-back{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);
    border-radius:7px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none}
  .tb-back:hover{background:rgba(255,255,255,.14);color:#fff}
  #search{position:relative;width:min(300px,32vw)}
  #search input{width:100%;height:32px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
    color:#fff;border-radius:7px;padding:0 30px 0 11px;font-size:13px;font-family:var(--sans);outline:none}
  #search input::placeholder{color:rgba(255,255,255,.4)}
  #search input:focus{border-color:var(--amp)}
  #search .ic{position:absolute;right:9px;top:8px;color:rgba(255,255,255,.4);font-size:13px}
  .modechip{font-family:var(--mono);font-size:10px;color:var(--amp);border:1px solid rgba(255,176,32,.4);
    border-radius:20px;padding:6px 12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap}
  .modechip.on{background:rgba(255,176,32,.16);border-color:var(--amp)}

  /* Left layer rail */
  #rail{position:absolute;left:12px;top:72px;z-index:1150;width:216px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,.5);max-height:calc(100vh - 96px);display:flex;flex-direction:column}
  #layers{overflow-y:auto;flex:1 1 auto}
  .rail-h{padding:10px 12px;font-family:var(--mono);font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex:0 0 auto}
  .rail-h .cnt{color:var(--dim)}
  #railFilter{position:relative;flex:0 0 auto;border-bottom:1px solid var(--line)}
  #railFilter input{width:100%;height:30px;border:0;background:var(--panel2);color:var(--ink);
    padding:0 26px 0 12px;font-size:12px;font-family:var(--sans);outline:none}
  #railFilter input::placeholder{color:var(--dim)}
  #railFilter .fx{position:absolute;right:9px;top:7px;color:var(--dim);font-size:11px;cursor:pointer}
  /* category header (collapsible) */
  .cat-h{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;
    background:var(--panel2);border-bottom:1px solid var(--line);user-select:none}
  .cat-h:hover{background:var(--line)}
  .cat-h .car{font-size:9px;color:var(--muted);transition:transform .15s;width:8px}
  .cat-h.collapsed .car{transform:rotate(-90deg)}
  .cat-h .cnm{flex:1;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink)}
  .cat-h .con{font-family:var(--mono);font-size:9px;color:var(--amp)}
  .cat-body.collapsed{display:none}
  .lyr{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 20px;cursor:pointer;border-bottom:1px solid rgba(30,43,58,.5)}
  .lyr:last-child{border-bottom:0}
  .lyr:hover{background:var(--panel2)}
  .lyr.hidden{display:none}
  .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto;box-shadow:0 0 0 3px rgba(255,255,255,.04)}
  .lyr .nm{font-size:12px;flex:1}
  .lyr .st{font-family:var(--mono);font-size:9px;color:var(--dim)}
  .lyr.off{opacity:.4}
  .lyr.off .st{color:var(--dim)}
  .tick{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--line);flex:0 0 auto;position:relative}
  .lyr:not(.off) .tick{background:var(--amp);border-color:var(--amp)}
  .lyr:not(.off) .tick:after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;
    border:solid #0a0e14;border-width:0 2px 2px 0;transform:rotate(45deg)}

  /* Analysis panel (right) */
  #panel{position:absolute;right:12px;top:72px;bottom:12px;z-index:1150;width:326px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;
    display:flex;flex-direction:column;box-shadow:0 14px 40px rgba(0,0,0,.5);transform:translateX(360px);
    transition:transform .28s cubic-bezier(.2,.8,.2,1)}
  #panel.open{transform:none}
  .p-h{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
  .p-h .dot{width:8px;height:8px;border-radius:50%;background:var(--amp);box-shadow:0 0 10px var(--amp)}
  .p-h .ti{font-weight:700;font-size:13px}
  .p-h .x{margin-left:auto;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
  .p-b{padding:6px 14px 16px;overflow:auto;flex:1}
  .coord{font-family:var(--mono);font-size:11px;color:var(--muted);margin:8px 0 14px;padding:8px 10px;
    background:var(--panel2);border:1px solid var(--line);border-radius:7px}
  .sec{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:16px 0 8px}
  .row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(30,43,58,.55)}
  .row:last-child{border-bottom:0}
  .row .ic{width:9px;height:9px;border-radius:2px;margin-top:4px;flex:0 0 auto}
  .row .main{flex:1;min-width:0}
  .row .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
  .row .dist{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--amp);white-space:nowrap}
  .score{display:flex;align-items:baseline;gap:8px;margin:4px 0 2px}
  .score .n{font-size:34px;font-weight:800;line-height:1;font-family:var(--mono)}
  .score .lab{font-size:11px;color:var(--muted)}
  .bar{height:5px;border-radius:3px;background:var(--panel2);overflow:hidden;margin:9px 0 2px}
  .bar>span{display:block;height:100%;border-radius:3px}
  .hint{font-size:12px;color:var(--muted);line-height:1.5}
  .empty{text-align:center;color:var(--dim);padding:40px 16px}
  .empty .big{font-size:26px;margin-bottom:10px}
  .empty .t{font-size:13px;color:var(--muted);line-height:1.5}

  /* legend / status bottom-left */
  #status{position:absolute;left:12px;bottom:12px;z-index:1100;font-family:var(--mono);font-size:10px;
    color:var(--muted);background:rgba(15,22,32,.88);border:1px solid var(--line);border-radius:7px;padding:7px 11px;
    display:flex;gap:12px;align-items:center;max-width:calc(100vw - 24px);overflow:hidden}
  #status .d{width:6px;height:6px;border-radius:50%;background:var(--ok)}
  #status.load .d{background:var(--warn);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}

  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:9px}
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line)}
  .leaflet-popup-content{margin:11px 13px;font-size:12.5px}
  .pp-t{font-weight:700;margin-bottom:5px}
  .pp-r{font-family:var(--mono);font-size:10.5px;color:var(--muted);line-height:1.7}
  .pp-r b{color:var(--ink);font-weight:600}
  .leaflet-bar a{background:var(--panel2);color:var(--ink);border-color:var(--line)}
  .leaflet-bar a:hover{background:var(--line)}

  @media(max-width:720px){
    #rail{width:170px;top:60px;left:8px}
    #panel{width:calc(100vw - 16px);right:8px;top:auto;bottom:8px;height:52vh}
    #panel.open{transform:none}
    #search{width:38vw}
    .brand .sub{display:none}
  }
  .pin-drop{cursor:crosshair!important}
  #eiaPanel{position:absolute;left:12px;bottom:52px;z-index:1150;width:236px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,.5);max-height:56vh;overflow-y:auto}
  .eia-h{padding:12px 13px 8px}
  .eia-h .big{font-size:22px;font-weight:800;font-family:var(--mono);letter-spacing:-.02em}
  .eia-h .sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.06em}
  .eia-t{display:flex;align-items:center;gap:9px;padding:6px 13px;font-size:12px}
  .eia-t .sw{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
  .eia-t .nm{flex:1}
  .eia-t .val{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:right}
  .eia-t .val b{color:var(--ink);font-weight:600}
</style>
</head>
<body>
<div id="map"></div>

<div id="topbar">
  <a href="/" id="tb-logo-link" class="tb-logo">
    <img src="/clearsky-omega-mark-white.png" alt="OMEGA" class="tb-omega" onerror="this.style.display='none'">
    <span class="tb-logo-txt">ClearSky<span>-OMEGA</span></span>
  </a>
  <div class="tb-sep"></div>
  <div class="tb-portal">EnergyOS</div>
  <span class="tb-badge" id="tb-badge">Enterprise</span>
  <div class="tb-title">Grid Atlas</div>
  <div class="tb-spacer"></div>
  <div class="modechip on" id="pinBtn" title="Drop a site pin to analyze grid proximity">◎ Pin&nbsp;Site</div>
  <div id="search"><input id="q" placeholder="Search address or place…" autocomplete="off"><span class="ic">⌕</span></div>
  <a href="/" id="tb-back-link" class="tb-back">← Platform</a>
</div>

<div id="rail">
  <div class="rail-h"><span>Grid Layers</span><span class="cnt" id="railCnt">—</span></div>
  <div id="railFilter"><input id="lyrFilter" placeholder="Filter layers…" autocomplete="off"><span class="fx" id="lyrFilterClear" style="display:none">✕</span></div>
  <div id="layers"></div>
  <div class="rail-h" style="border-top:1px solid var(--line)"><span>Voltage</span></div>
  <div id="voltLegend"></div>
</div>

<div id="eiaPanel" style="display:none"></div>

<div id="panel">
  <div class="p-h"><span class="dot"></span><span class="ti">Site Analysis</span><span class="x" id="pClose">✕</span></div>
  <div class="p-b" id="pBody">
    <div class="empty">
      <div class="big">◎</div>
      <div class="t">Drop a pin anywhere on the map to score interconnection proximity — nearest substation, transmission voltage, generation, data-center clusters, and EV/BESS context.</div>
    </div>
  </div>
</div>

<div id="status"><span class="d"></span><span id="stTxt">Ready · public grid data</span></div>

<!-- Firebase compat v8 + shared platform config/registry (OMEGA standard order) -->
<!-- config.js should provide (browser-visible; free-tier keys only, NEVER paid backend keys):
       window.CLEARSKY_CONFIG.eiaApiKey   = "...";  // EIA plants layer  (free)
       window.CLEARSKY_CONFIG.fccBbKey    = "...";  // live fiber-at-point (broadbandmap.com free demo)
     Paid fiber route data (GeoTel/FiberLocator/LandGate) needs a serverless proxy — do NOT
     put those keys here; wire them behind a Vercel function and point the tool at that. -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/config.js"></script>
<script src="/omega-tools.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function(){
"use strict";

function fail(msg){
  var s=document.getElementById("stTxt"), b=document.getElementById("status");
  if(s){ s.textContent=msg; } if(b){ b.className=""; b.querySelector(".d").style.background="#ff5c3a"; }
}
if(typeof L==="undefined"||!L.map){
  fail("Map library failed to load — check network/CDN access");
  return;
}
window.onerror=function(m){ fail("Error: "+m); };

/* ---------- OMEGA workspace badge + tenant platform nav (matches other tools) ---------- */
(function applyWorkspace(){
  try{
    if(window.OMEGA_WORKSPACE){
      var b=document.getElementById("tb-badge");
      if(b) b.textContent=window.OMEGA_WORKSPACE.accountTier||"Enterprise";
      var t=document.getElementById("tb-title");
      if(t&&window.OMEGA_WORKSPACE.name) t.textContent=window.OMEGA_WORKSPACE.name+" · Grid Atlas";
    }
  }catch(e){}
})();
/* Rewrite logo + "← Platform" to the tenant portal the user came from.
   Served from tools.csebuilders.com and shared, so bare "/" would land on the tool host. */
function gaTenantPortalUrl(){
  var BRAND={"nextnrg.com":"nextnrg","solela.com":"solela","chileasing.com":"chileasing",
    "spatco.com":"spatco","ogisolar.com":"ogisolar"};
  var slug=null;
  try{ var org=((window.OMEGATools&&OMEGATools.orgFromUrl?OMEGATools.orgFromUrl(""):"")||"").toLowerCase();
       if(BRAND[org]) slug=BRAND[org]; }catch(e){}
  if(!slug&&document.referrer){
    try{ var h=new URL(document.referrer).hostname;
      if(/\.csebuilders\.com$/.test(h)){ var sub=h.split(".")[0]; if(sub&&sub!=="tools") slug=sub; } }catch(e2){}
  }
  return slug?"https://"+slug+".csebuilders.com/":"https://tools.csebuilders.com/";
}
(function wireNav(){
  var url=gaTenantPortalUrl();
  var back=document.getElementById("tb-back-link"), logo=document.getElementById("tb-logo-link");
  if(back) back.setAttribute("href",url);
  if(logo) logo.setAttribute("href",url);
})();

/* ---------- Layer registry: real public ArcGIS/HIFLD + open endpoints ---------- */
/* Each layer queries live in the user's browser (no key needed for HIFLD/OSM). */
var LAYERS = {
  substations: {
    name:"Substations", color:"#ffb020", on:true, geom:"point", role:"interconnect",
    url:"https://services5.arcgis.com/HDRa0B57OVrv2E1q/ArcGIS/rest/services/Electric_Substations/FeatureServer/0",
    urls:[
      // 1) EIA U.S. Energy Atlas — federally maintained (EIA), WGS84-native, actively updated
      "https://services5.arcgis.com/HDRa0B57OVrv2E1q/ArcGIS/rest/services/Electric_Substations/FeatureServer/0",
      // 2) HIFLD mirror (program decommissioned 8/25/2025, but service still responds)
      "https://services.arcgis.com/G4S1dGvn7PIgYd6Y/ArcGIS/rest/services/HIFLD_electric_power_substations/FeatureServer/0",
      // 3) FEMA IEM_Support energy MapServer (federal, live)
      "https://disasters.geoplatform.gov/arcgis/rest/services/IEM_Support/r00_energy/MapServer/2"
    ],
    label:function(a){return a.NAME||a.name||a.SUBSTATION||"Substation";},
    meta:function(a){var v=a.MAX_VOLT||a.VOLTAGE||a.max_volt||a.MAX_VOLTAG;return (v&&v>0?v+" kV · ":"")+(a.STATUS||a.TYPE||a.LINES?(a.LINES+" lines"):"");}
  },
  transmission: {
    name:"Transmission", color:"#ff5c3a", on:true, geom:"line", role:"interconnect",
    url:"https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/US_Electric_Power_Transmission_Lines/FeatureServer/0",
    urls:[
      // EIA Atlas / fedmaps (Aug-2025 edit, WGS84) then HIFLD mirrors
      "https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/US_Electric_Power_Transmission_Lines/FeatureServer/0",
      "https://services5.arcgis.com/HDRa0B57OVrv2E1q/ArcGIS/rest/services/Electric_Power_Transmission_Lines/FeatureServer/0",
      "https://services.arcgis.com/G4S1dGvn7PIgYd6Y/ArcGIS/rest/services/Electric_Power_Transmission_Lines/FeatureServer/0"
    ],
    label:function(a){return a.OWNER||a.SUB_1||"Transmission line";},
    meta:function(a){var v=+(a.VOLTAGE||0);return (v>0?v+" kV":(a.VOLT_CLASS||"HV"));}
  },
  plants: {
    name:"Power Plants", color:"#38d9c4", on:true, geom:"point", role:"generation",
    url:"https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/Power_Plants_in_the_US/FeatureServer/0",
    urls:[
      "https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/Power_Plants_in_the_US/FeatureServer/0",
      "https://services.arcgis.com/G4S1dGvn7PIgYd6Y/ArcGIS/rest/services/Power_Plants/FeatureServer/0"
    ],
    label:function(a){return a.Plant_Name||a.NAME||a.PLANT_NAME||"Power plant";},
    meta:function(a){var mw=a.Total_MW||a.TOTAL_MW||a.MW||a.OP_CAP;return (mw?Math.round(mw)+" MW · ":"")+(a.PrimSource||a.PRIM_FUEL||a.PRIMSOURCE||a.FUEL||"");}
  },
  datacenters: {
    name:"Data Centers", color:"#a78bfa", on:false, geom:"point", role:"load",
    url:"__OSM__", osmTag:'["telecom"="data_center"]',
    label:function(a){return a.name||"Data center";},
    meta:function(a){return a.operator||a.brand||"colo / compute";}
  },
  ev: {
    name:"EV Chargers", color:"#4ea3ff", on:false, geom:"point", role:"load",
    url:"__OSM__", osmTag:'["amenity"="charging_station"]',
    label:function(a){return a.name||a.operator||"Charging station";},
    meta:function(a){return (a.socket_type2||a.socket_ccs2?"CCS/L2":"")||(a.capacity?a.capacity+" ports":"EV")}
  },
  bess: {
    name:"Storage / BESS", color:"#6ee76e", on:false, geom:"point", role:"generation",
    url:"__OSM__", osmTag:'["power"="plant"]["plant:source"="battery"]',
    label:function(a){return a.name||"Battery storage";},
    meta:function(a){return a["plant:output:electricity"]||a.operator||"BESS";}
  },
  osm_lines: {
    name:"OSM Power Lines", color:"#B55D00", on:false, geom:"line", role:"interconnect",
    url:"__OSMGEOM__", osmTag:'["power"="line"]', voltColor:true,
    label:function(a){return a.operator||a.name||"Power line";},
    meta:function(a){var kv=osmKv(a);return (kv?kv+" kV":"line")+(a.cables?" · "+a.cables+"c":"");}
  },
  osm_subs: {
    name:"OSM Substations", color:"#ffb020", on:false, geom:"point", role:"interconnect",
    url:"__OSM__", osmTag:'["power"="substation"]', voltColor:true,
    label:function(a){return a.name||"Substation";},
    meta:function(a){var kv=osmKv(a);return (kv?kv+" kV":"")+(a.substation?" · "+a.substation:"");}
  },
  osm_plants: {
    name:"OSM Plants", color:"#38d9c4", on:false, geom:"point", role:"generation",

  "solar":{c:"#E5B93C",label:"Solar"}, "SUN":{c:"#E5B93C",label:"Solar"},
  "wind":{c:"#4EA3FF",label:"Wind"}, "WND":{c:"#4EA3FF",label:"Wind"},

  "nuclear":{c:"#5FBF8E",label:"Nuclear"}, "NUC":{c:"#5FBF8E",label:"Nuclear"},
  "natural gas":{c:"#B07ED6",label:"Gas"}, "NG":{c:"#B07ED6",label:"Gas"},
  "coal":{c:"#8A8A8A",label:"Coal"}, "BIT":{c:"#8A8A8A",label:"Coal"}, "SUB":{c:"#8A8A8A",label:"Coal"},

  "biomass":{c:"#9BCF4A",label:"Biomass"}, "WDS":{c:"#9BCF4A",label:"Biomass"}
};
function eiaTech(row){
  var t=(row.technology||row["energy_source_code"]||row.energy_source_code||"").toString();
  var key=t.toLowerCase();
  return EIA_TECH[key]||EIA_TECH[t]||{c:"#7d8fa3",label:t||"Other"};

/* ---------- Voltage → color (ported from OpenInfraMap style_oim_power.ts, BSD-3) ----------
   Stepwise color ramp keyed on kV. HVDC and traction get special colors. */
var VOLT_SCALE=[[0,"#7A7A85"],[10,"#6E97B8"],[25,"#55B555"],[52,"#B59F10"],
                [132,"#B55D00"],[220,"#C73030"],[310,"#B54EB2"],[550,"#00C1CF"]];
function voltColor(kv){
  var v=+kv||0, c=VOLT_SCALE[0][1];
  for(var i=0;i<VOLT_SCALE.length;i++){ if(v>=VOLT_SCALE[i][0]) c=VOLT_SCALE[i][1]; }
  return c;
}
/* Parse an OSM voltage tag like "138000" or "115000;69000" → highest kV */
function osmKv(props){
  var raw=props.voltage||props.voltage_1||""; if(!raw) return 0;
  var parts=(""+raw).split(";"), max=0;
  for(var i=0;i<parts.length;i++){ var n=parseFloat(parts[i]); if(n>max) max=n; }
  return max>1000?max/1000:max; // volts→kV if needed
}

  biomass:"#7FA05F",waste:"#8A7A5F",battery:"#6ee76e",geothermal:"#B54EB2"};
function plantColor(props){
  var s=(props["plant:source"]||props["generator:source"]||"").toLowerCase();
  return PLANT_COLORS[s]||"#38d9c4";
}

/* ---------- Fetch: ArcGIS FeatureServer query within current view ----------
   Walks a fallback chain of endpoints (L2.urls[]), so a dead mirror auto-recovers
   to the next. This is the reliability layer: HIFLD's official portal was
   decommissioned 8/25/2025, so grid layers rely on redundant public mirrors. */
function fetchArc(key,cb){
  var L2=LAYERS[key], b=map.getBounds();
  var env=b.getWest()+","+b.getSouth()+","+b.getEast()+","+b.getNorth();
  var qs="/query?f=geojson&where=1%3D1&outFields=*&returnGeometry=true"+
    "&geometryType=esriGeometryEnvelope&inSR=4326&outSR=4326&spatialRel=esriSpatialRelIntersects"+
    "&resultRecordCount=1000&geometry="+encodeURIComponent(env);
  // Build the ordered list of endpoints to try
  var chain=[];
  if(L2.urls&&L2.urls.length){ chain=L2.urls.slice(); }
  else { if(L2.url)chain.push(L2.url); if(L2.urlAlt)chain.push(L2.urlAlt); }
  var i=0;
  function attempt(){
    if(i>=chain.length){ cb([]); return; }
    var base=chain[i++];
    ajax(base+qs,function(err,json){
      if(err||!json||!json.features||!json.features.length){ attempt(); return; }
      var feats=json.features.map(function(f){ return {props:f.properties||{}, geom:f.geometry}; });
      if(L2.urls&&i>1) status("Loaded "+L2.name+" via backup mirror ("+i+"/"+chain.length+")",false);
      cb(feats);
    });
  }
  attempt();
}

/* ---------- Fetch: OSM Overpass within view (points or line geometry) ---------- */
function fetchOSM(key,cb){
  var L2=LAYERS[key], b=map.getBounds();
  var bbox=b.getSouth()+","+b.getWest()+","+b.getNorth()+","+b.getEast();
  var wantGeom=(L2.url==="__OSMGEOM__");
  var q;
  if(wantGeom){
    q="[out:json][timeout:25];(way"+L2.osmTag+"("+bbox+"););out geom 800;";
  } else {
    q="[out:json][timeout:25];(node"+L2.osmTag+"("+bbox+");way"+L2.osmTag+"("+bbox+"););out center 600;";
  }
  ajax("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(q),function(err,json){
    if(err||!json){ cb([]); return; }
    var feats=(json.elements||[]).map(function(e){
      if(wantGeom&&e.geometry){
        var coords=e.geometry.map(function(p){return [p.lon,p.lat];});
        return {props:e.tags||{}, geom:{type:"LineString",coordinates:coords}};
      }
      var lat=e.lat||(e.center&&e.center.lat), lon=e.lon||(e.center&&e.center.lon);
      if(lat==null) return null;
      return {props:e.tags||{}, geom:{type:"Point",coordinates:[lon,lat]}};
    }).filter(Boolean);
    cb(feats);
  });
}

/* ---------- Fetch: EIA operating-generator-capacity (Inventory of Operable Generators) ----------
   Returns generator rows with nameplate MW, technology, lat/lon (when present).
   Also drives the national technology-breakdown panel. */
var EIA_STATS=null; // {total_mw, total_count, byTech:{label:{mw,count,color}}}
function fetchEIA(key,cb){
  var cfg=window.CLEARSKY_CONFIG||{};
  var apiKey=cfg.eiaApiKey||(cfg.apiKeys&&cfg.apiKeys.eia)||(window.CS_CONFIG&&window.CS_CONFIG.EIA_API_KEY)||"";
  if(!apiKey){ status("EIA layer needs an API key (set eiaApiKey in config.js)",false); cb([]); return; }
  // Pull operable generators nationally; EIA caps rows per call, so request a large page.
  var base="https://api.eia.gov/v2/electricity/operating-generator-capacity/data/";
  var params="?api_key="+encodeURIComponent(apiKey)+
    "&frequency=monthly&data[0]=nameplate-capacity-mw&data[1]=net-summer-capacity-mw"+
    "&sort[0][column]=period&sort[0][direction]=desc"+
    "&facets[status][]=OP"+  // operating only
    "&length=5000";
  ajax(base+params,function(err,json){
    if(err||!json||!json.response){ status("EIA request failed",false); cb([]); return; }
    var rows=json.response.data||[];
    // Deduplicate to latest period per plant+generator
    var seen={}, uniq=[];
    for(var i=0;i<rows.length;i++){
      var r=rows[i], id=(r.plantid||r.plantId||r.plantCode||"")+"|"+(r.generatorid||r.generatorId||"");
      if(seen[id]) continue; seen[id]=1; uniq.push(r);
    }
    // Build stats + bubble features
    var stats={total_mw:0,total_count:0,byTech:{}};
    var feats=[];
    for(var j=0;j<uniq.length;j++){
      var row=uniq[j];
      var mw=parseFloat(row["nameplate-capacity-mw"]||row.nameplateCapacityMw||0)||0;
      var tech=eiaTech(row);
      stats.total_mw+=mw; stats.total_count++;
      if(!stats.byTech[tech.label]) stats.byTech[tech.label]={mw:0,count:0,color:tech.c};
      stats.byTech[tech.label].mw+=mw; stats.byTech[tech.label].count++;
      var lat=parseFloat(row.latitude||row.lat), lon=parseFloat(row.longitude||row.lon);
      if(!isNaN(lat)&&!isNaN(lon)){
        feats.push({props:{plantName:row.plantName||row.plantid,mw:mw,tech:tech.label,
          techLabel:tech.label,techColor:tech.c},
          geom:{type:"Point",coordinates:[lon,lat]}, bubbleMw:mw, bubbleColor:tech.c});
      }
    }
    EIA_STATS=stats;
    renderEIAPanel(stats);
    cb(feats);
  });
}

/* ---------- Static GeoJSON loader (InterTubes backbone, or any bundled geo) ----------
   Loads a GeoJSON bundled on the tools host. National — ignores map extent. */
function fetchStatic(key,cb){
  var L2=LAYERS[key];
  ajax(L2.staticFile,function(err,json){
    if(err||!json){ status("Data not found — "+L2.staticFile,false); cb([]); return; }
    var raw = json.features ? json.features : (json.length!=null ? json : []);
    var feats=[];
    for(var i=0;i<raw.length;i++){ var f=raw[i]; if(!f||!f.geometry) continue;
      feats.push({props:f.properties||{}, geom:f.geometry}); }
    cb(feats);
  });
}

function ajax(url,cb){
  var x=new XMLHttpRequest();
  x.open("GET",url,true); x.timeout=28000;
  x.onreadystatechange=function(){
    if(x.readyState!==4) return;
    if(x.status>=200&&x.status<300){
      try{ cb(null,JSON.parse(x.responseText)); }catch(e){ cb(e); }
    } else cb(new Error("HTTP "+x.status));
  };
  x.ontimeout=function(){ cb(new Error("timeout")); };
  x.onerror=function(){ cb(new Error("network")); };
  x.send();
}

/* ---------- Render ---------- */
function featColor(L2,props){
  if(L2.voltColor){ var kv=osmKv(props); if(kv>0) return voltColor(kv); }
  if(L2.plantColor){ return plantColor(props); }
  return L2.color;
}
function renderLayer(key,feats){
  var L2=LAYERS[key], g=groups[key]; g.clearLayers();
  cache[key]=feats;
  for(var i=0;i<feats.length;i++){
    var f=feats[i], gm=f.geom; if(!gm) continue;
    var col=featColor(L2,f.props);
    if(gm.type==="Point"){
      var c=gm.coordinates;
      if(f.bubbleMw!=null){
        // MW-scaled bubble (sqrt scale so area ~ capacity), like OpenGridWorks
        var mw=f.bubbleMw, r=Math.max(3,Math.min(26,Math.sqrt(mw)*0.55));
        var bc=f.bubbleColor||col;
        L.circleMarker([c[1],c[0]],{radius:r,color:bc,weight:1,fillColor:bc,fillOpacity:.4})
          .bindPopup(popup(L2,f.props,bc)).addTo(g);
      } else {
        L.circleMarker([c[1],c[0]],{radius:L2.geom==="point"?5:4,color:col,weight:1.5,
          fillColor:col,fillOpacity:.65}).bindPopup(popup(L2,f.props,col)).addTo(g);
      }
    } else if(gm.type==="LineString"||gm.type==="MultiLineString"){
      var lines=gm.type==="LineString"?[gm.coordinates]:gm.coordinates;
      // weight scales with voltage for the OIM look
      var kv=osmKv(f.props), w=kv>=220?2.6:kv>=110?2.0:1.6;
      for(var j=0;j<lines.length;j++){
        var latlngs=lines[j].map(function(p){return [p[1],p[0]];});
        L.polyline(latlngs,{color:col,weight:w,opacity:.75}).bindPopup(popup(L2,f.props,col)).addTo(g);
      }
    } else if(gm.type==="Polygon"||gm.type==="MultiPolygon"){
      var polys=gm.type==="Polygon"?[gm.coordinates]:gm.coordinates;
      for(var p=0;p<polys.length;p++){
        var rings=polys[p].map(function(ring){return ring.map(function(pt){return [pt[1],pt[0]];});});
        L.polygon(rings,{color:col,weight:1.2,opacity:.6,fillColor:col,fillOpacity:.08})
          .bindPopup(popup(L2,f.props,col)).addTo(g);
      }
    }
  }
}
function popup(L2,a,col){
  col=col||L2.color;
  return '<div class="pp-t" style="color:'+col+'">'+esc(L2.label(a))+'</div>'+
         '<div class="pp-r">'+esc(L2.meta(a)||"")+'</div>';
}

/* ---------- EIA national technology-breakdown panel (image-2 style) ---------- */
function renderEIAPanel(stats){
  var el=document.getElementById("eiaPanel");
  if(!stats||!stats.total_count){ el.style.display="none"; return; }
  // sort techs by capacity desc
  var techs=[];
  for(var k in stats.byTech){ if(stats.byTech.hasOwnProperty(k)) techs.push([k,stats.byTech[k]]); }
  techs.sort(function(a,b){return b[1].mw-a[1].mw;});
  var gw=(stats.total_mw/1000).toFixed(1);
  var h='<div class="eia-h"><div class="big">'+gw+' GW</div>'+
        '<div class="sub">'+stats.total_count.toLocaleString()+' operable generators · EIA-860M</div></div>';
  for(var i=0;i<techs.length;i++){
    var name=techs[i][0], d=techs[i][1];
    h+='<div class="eia-t"><span class="sw" style="background:'+d.color+'"></span>'+
       '<span class="nm">'+esc(name)+'</span>'+
       '<span class="val"><b>'+d.count.toLocaleString()+'</b> · '+(d.mw/1000).toFixed(1)+' GW</span></div>';
  }
  el.innerHTML=h; el.style.display="block";
}
function esc(s){ s=(s==null?"":""+s); return s.replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }

/* ---------- Load visible layers on move ---------- */
var loadTimer;
function loadVisible(){
  if(map.getZoom()<5){ status("Zoom in to load grid features",false); return; }
  var todo=ORDER.filter(function(k){return LAYERS[k].on;});
  if(!todo.length){ status("No layers active",false); return; }
  var pending=todo.length, any=false;
  status("Loading "+todo.length+" layer"+(todo.length>1?"s":"")+"…",true);
  todo.forEach(function(k){
    var isOSM=(LAYERS[k].url==="__OSM__"||LAYERS[k].url==="__OSMGEOM__");
    var fn=LAYERS[k].url==="__STATIC__"?fetchStatic:
           (LAYERS[k].url==="__EIA__"?fetchEIA:(isOSM?fetchOSM:fetchArc));
    fn(k,function(feats){
      renderLayer(k,feats); if(feats.length) any=true;
      updateRailCounts();
      if(--pending===0){
        status(any?"Loaded · "+countAll()+" features in view":"No features in this view (data coverage varies)",false);
        if(pinLatLng) analyze(pinLatLng);
      }
    });
  });
}
function debounceLoad(){ clearTimeout(loadTimer); loadTimer=setTimeout(loadVisible,550); }
map.on("moveend",debounceLoad);

        '<span class="tick"></span>';
      el.onclick=function(){
        L2.on=!L2.on;
        el.className="lyr"+(L2.on?"":" off");
        if(L2.on){ groups[k].addTo(map); loadVisible(); }
        else { map.removeLayer(groups[k]); }
        updateRailCounts();
      };
      body.appendChild(el);
    });
    layersEl.appendChild(body);
  });
  updateRailCounts();
}

/* ---------- Pin + proximity analysis ---------- */
var pinLatLng=null, pinMarker=null, pinMode=true;
var pinBtn=document.getElementById("pinBtn");
pinBtn.onclick=function(){ pinMode=!pinMode; pinBtn.className="modechip"+(pinMode?" on":"");
  document.getElementById("map").className=pinMode?"pin-drop":""; };

function dropPin(ll){
  pinLatLng=ll;
  if(pinMarker) map.removeLayer(pinMarker);

    '<div style="width:22px;height:22px;margin:-11px 0 0 -11px;border-radius:50%;'+

    iconSize:[0,0]})}).addTo(map);
  openPanel(); analyze(ll);

function haversine(a,b,c,d){
  var R=6371,dLat=(c-a)*Math.PI/180,dLon=(d-b)*Math.PI/180;
  var s=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function ptToSeg(p,v,w){ // km distance point→segment, all [lat,lng]
  var toXY=function(ll){return [ll[1]*Math.cos(p[0]*Math.PI/180)*111.32, ll[0]*110.57];};
  var P=toXY(p),A=toXY(v),B=toXY(w);
  var dx=B[0]-A[0],dy=B[1]-A[1], l2=dx*dx+dy*dy;
  var t= l2? ((P[0]-A[0])*dx+(P[1]-A[1])*dy)/l2 : 0; t=Math.max(0,Math.min(1,t));
  var cx=A[0]+t*dx, cy=A[1]+t*dy;
  return Math.sqrt((P[0]-cx)*(P[0]-cx)+(P[1]-cy)*(P[1]-cy));
}
function nearestPoint(ll,feats,L2){
  var best=null,bd=1e9;
  (feats||[]).forEach(function(f){
    if(!f.geom||f.geom.type!=="Point")return;
    var c=f.geom.coordinates, d=haversine(ll.lat,ll.lng,c[1],c[0]);
    if(d<bd){bd=d;best=f;}
  });
  return best?{f:best,km:bd}:null;
}
function nearestLine(ll,feats){
  var bd=1e9, bestProps=null;
  (feats||[]).forEach(function(f){
    if(!f.geom)return;
    var lines=f.geom.type==="LineString"?[f.geom.coordinates]:
              (f.geom.type==="MultiLineString"?f.geom.coordinates:null);
    if(!lines)return;
    for(var j=0;j<lines.length;j++){var pts=lines[j];
      for(var k=1;k<pts.length;k++){
        var d=ptToSeg([ll.lat,ll.lng],[pts[k-1][1],pts[k-1][0]],[pts[k][1],pts[k][0]]);
        if(d<bd){bd=d;bestProps=f.props;}
      }}
  });
  return bestProps?{km:bd,props:bestProps}:null;
}
function within(ll,feats,km){
  var n=0; (feats||[]).forEach(function(f){ if(f.geom&&f.geom.type==="Point"){
    var c=f.geom.coordinates; if(haversine(ll.lat,ll.lng,c[1],c[0])<=km)n++; }}); return n;
}
/* ray-casting point-in-ring; lng=x, lat=y */
function pointInRing(x,y,ring){
  var inside=false;
  for(var i=0,j=ring.length-1;i<ring.length;j=i++){
    var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function containingFeature(ll,feats){
  var x=ll.lng,y=ll.lat;
  var arr=feats||[];
  for(var i=0;i<arr.length;i++){
    var gm=arr[i].geom; if(!gm) continue;
    var polys=gm.type==="Polygon"?[gm.coordinates]:(gm.type==="MultiPolygon"?gm.coordinates:null);
    if(!polys) continue;
    for(var p=0;p<polys.length;p++){
      var outer=polys[p][0]; if(outer&&pointInRing(x,y,outer)) return arr[i];
    }
  }
  return null;
}

function analyze(ll){
  var sub=nearestPoint(ll,cache.substations,LAYERS.substations);
  if(sub) sub.src="substations";
  var subOsm=nearestPoint(ll,cache.osm_subs,LAYERS.osm_subs);
  if(subOsm&&(!sub||subOsm.km<sub.km)){ sub=subOsm; sub.src="osm_subs"; } // OSM independent fallback/refiner
  var tx=nearestLine(ll,cache.transmission);
  var plant=nearestPoint(ll,cache.plants,LAYERS.plants);
  var dcN=within(ll,cache.datacenters,40);
  var evN=within(ll,cache.ev,15);
  var fiberSets=[cache.fiber_verified,cache.ll_backbone,cache.fiber_ca,cache.fiber,cache.fiber_estimated,cache.subsea];
  var fiber=null;
  for(var fi=0;fi<fiberSets.length;fi++){
    var cand=nearestLine(ll,fiberSets[fi]);
    if(cand&&(!fiber||cand.km<fiber.km)) fiber=cand;
  }

  // interconnect score: closer substation + higher-voltage nearby line = better
  var subKm=sub?sub.km:99;
  var txKm=tx?tx.km:99;
  var txV=tx?(+(tx.props.VOLTAGE||tx.props.VOLT_CLASS||0)):0;
  var s1=Math.max(0,100-subKm*14);         // <7km strong
  var s2=Math.max(0,100-txKm*20);          // <5km strong
  var s3=txV>=230?100:txV>=115?78:txV>=69?55:txV>0?35:45;
  var score=Math.round(s1*0.42+s2*0.33+s3*0.25);
  score=Math.max(1,Math.min(100,score));
  var band=score>=70?"var(--ok)":score>=45?"var(--warn)":"var(--bad)";
  var verdict=score>=70?"Strong interconnect proximity":score>=45?"Workable — verify hosting capacity":"Constrained — distance to grid is a cost driver";

  var h='';
  h+='<div class="coord">'+ll.lat.toFixed(5)+', '+ll.lng.toFixed(5)+
     '  ·  <span style="color:var(--amp);cursor:pointer" id="copyc">copy</span></div>';

  h+='<div class="sec">Interconnect Score</div>';
  h+='<div class="score"><span class="n" style="color:'+band+'">'+score+'</span><span class="lab">/ 100</span></div>';
  h+='<div class="bar"><span style="width:'+score+'%;background:'+band+'"></span></div>';
  h+='<div class="hint" style="margin:6px 0 2px;color:'+band+'">'+verdict+'</div>';

  h+='<div class="sec">Nearest Infrastructure</div>';
  var subL=sub?LAYERS[sub.src||"substations"]:LAYERS.substations;
  h+=infoRow(LAYERS.substations.color, sub?subL.label(sub.f.props):"No substation in view",
        sub?(subL.meta(sub.f.props)||"")+(sub.src==="osm_subs"?" · OSM":""):"widen the map / enable layer", sub?fmtKm(sub.km):"—");
  h+=infoRow(LAYERS.transmission.color, tx?"Transmission line":"No line in view",
        tx?((txV?txV+" kV":(tx.props.VOLT_CLASS||"HV"))):"enable transmission layer", tx?fmtKm(tx.km):"—");
  h+=infoRow(LAYERS.plants.color, plant?LAYERS.plants.label(plant.f.props):"No plant in view",
        plant?LAYERS.plants.meta(plant.f.props):"", plant?fmtKm(plant.km):"—");

  h+='<div class="sec">Load Context</div>';
  h+=infoRow(LAYERS.datacenters.color,"Data centers","within 40 km"+(LAYERS.datacenters.on?"":" · layer off"),String(dcN));
  h+=infoRow(LAYERS.ev.color,"EV charging sites","within 15 km"+(LAYERS.ev.on?"":" · layer off"),String(evN));

  h+='<div class="sec">Connectivity</div>';
  h+=infoRow(LAYERS.fiber.color, fiber?"Fiber route":"No fiber in view",
        fiber?"nearest backbone"+(LAYERS.fiber.on?"":" · layer off"):"enable Fiber Routes layer",
        fiber?fmtKm(fiber.km):"—");
  h+='<div id="bbRow"></div>'; // live FCC broadband-at-point, filled async
  if(fiber){
    var fv=fiber.km<=2?"On-net — minimal lateral build":fiber.km<=8?"Near backbone — modest lateral":"Fiber build is a cost driver";
    h+='<div class="hint" style="margin:2px 0 0;color:var(--muted)">'+fv+'. OSM fiber coverage is partial (backbones/submarine); absence isn\'t proof of no fiber.</div>';
  }

  // Market / utility context via point-in-polygon
  var terr=containingFeature(ll,cache.utility_terr);
  var iso=containingFeature(ll,cache.iso_rto);
  var ba=containingFeature(ll,cache.ba_area);
  if(terr||iso||ba||LAYERS.utility_terr.on||LAYERS.iso_rto.on||LAYERS.ba_area.on){
    h+='<div class="sec">Market / Utility</div>';
    h+=infoRow(LAYERS.utility_terr.color,"Serving utility",
          terr?LAYERS.utility_terr.label(terr.props):(LAYERS.utility_terr.on?"none at this point":"enable Utility Territory"),
          terr?"↳":"—");
    h+=infoRow(LAYERS.iso_rto.color,"ISO / RTO",
          iso?LAYERS.iso_rto.label(iso.props):(LAYERS.iso_rto.on?"outside ISO (bilateral)":"enable ISO / RTO"),
          iso?"↳":"—");
    h+=infoRow(LAYERS.ba_area.color,"Balancing authority",
          ba?LAYERS.ba_area.label(ba.props):(LAYERS.ba_area.on?"—":"enable Balancing Authority"),
          ba?"↳":"—");
  }

  h+='<div class="sec">Notes</div>';
  h+='<div class="hint">Score weights substation distance (42%), transmission distance (33%), and voltage class (25%). '+
     'Coverage depends on active layers and map extent — enable a layer and it feeds the score automatically. '+
     'Public data (HIFLD / OSM); confirm hosting capacity with the utility before siting.</div>';

  document.getElementById("pBody").innerHTML=h;
  var cc=document.getElementById("copyc");
  if(cc) cc.onclick=function(){ copy(ll.lat.toFixed(6)+","+ll.lng.toFixed(6)); cc.textContent="copied"; };
  fetchBroadbandAtPoint(ll); // live FCC service check, fills #bbRow async
}

/* ---------- Live broadband-at-point (broadbandmap.com, FCC-sourced) ----------
   Free demo key required (June 2026+). Set fccBbKey in config.js. Fills #bbRow. */
function fetchBroadbandAtPoint(ll){
  var row=document.getElementById("bbRow"); if(!row) return;
  var cfg=window.CLEARSKY_CONFIG||{};
  var key=cfg.fccBbKey||(cfg.apiKeys&&cfg.apiKeys.broadband)||"";
  if(!key){
    row.innerHTML=infoRow("#00E0C6","Live fiber service","set fccBbKey in config.js for live check","—");
    return;
  }
  row.innerHTML=infoRow("#00E0C6","Live fiber service","checking FCC data…","…");
  var url="https://broadbandmap.com/api/v1/location/internet?service_type=business&lat="+
    encodeURIComponent(ll.lat.toFixed(5))+"&lng="+encodeURIComponent(ll.lng.toFixed(5));
  var x=new XMLHttpRequest();
  x.open("GET",url,true); x.timeout=15000;
  x.setRequestHeader("Authorization","Bearer "+key);
  x.onreadystatechange=function(){
    if(x.readyState!==4) return;
    if(x.status>=200&&x.status<300){
      try{
        var d=JSON.parse(x.responseText), provs=d.providers||[];
        var fiberP=[]; for(var i=0;i<provs.length;i++){ if((provs[i].technology||"")==="Fiber") fiberP.push(provs[i]); }
        if(fiberP.length){
          var best=fiberP[0];
          for(var j=1;j<fiberP.length;j++){ if((fiberP[j].max_download_mbps||0)>(best.max_download_mbps||0)) best=fiberP[j]; }
          var spd=best.max_download_mbps?(best.max_download_mbps>=1000?(best.max_download_mbps/1000)+"G":best.max_download_mbps+"M"):"";
          row.innerHTML=infoRow("#00E0C6","Live fiber service",
            fiberP.length+" fiber ISP"+(fiberP.length>1?"s":"")+" · "+esc(best.name)+(spd?" "+spd:""),"✓ FIBER");
        } else if(provs.length){
          row.innerHTML=infoRow("#7d8fa3","Live fiber service",provs.length+" ISP(s), no fiber at this cell","—");
        } else {
          row.innerHTML=infoRow("#7d8fa3","Live fiber service","no reported service at this cell","—");
        }
      }catch(e){ row.innerHTML=infoRow("#7d8fa3","Live fiber service","parse error","—"); }
    } else if(x.status===401){ row.innerHTML=infoRow("#ff5c3a","Live fiber service","invalid FCC API key","—"); }
    else if(x.status===429){ row.innerHTML=infoRow("#ffb020","Live fiber service","rate limit reached — try later","—"); }
    else { row.innerHTML=infoRow("#7d8fa3","Live fiber service","lookup unavailable","—"); }
  };
  x.ontimeout=function(){ row.innerHTML=infoRow("#7d8fa3","Live fiber service","timeout","—"); };
  x.onerror=function(){ row.innerHTML=infoRow("#7d8fa3","Live fiber service","network error","—"); };
  x.send();
}
function infoRow(color,nm,meta,dist){
  return '<div class="row"><span class="ic" style="background:'+color+'"></span>'+
    '<div class="main"><div class="nm">'+esc(nm)+'</div><div class="meta">'+esc(meta)+'</div></div>'+
    '<div class="dist">'+esc(dist)+'</div></div>';
}
function fmtKm(km){ return km<1?Math.round(km*1000)+" m":km.toFixed(1)+" km"; }
function copy(t){ try{var i=document.createElement("textarea");i.value=t;document.body.appendChild(i);i.select();document.execCommand("copy");document.body.removeChild(i);}catch(e){} }
