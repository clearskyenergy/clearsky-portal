<style>

.flex { display:flex; align-items:center; gap:10px; }

.tag-src.sig { background:#fff2d9; color:#9a6800; }
.toast { position:fixed; bottom:22px; right:22px; background:#0e1b33; color:#fff; padding:12px 18px; border-radius:9px; font-size:13px; box-shadow:0 8px 30px rgba(0,0,0,.3); z-index:200; display:none; }
.toast.on { display:block; }
.loading { padding:40px; text-align:center; color:#7b8794; }
.info-lock { background:#e8f0fb; border:1px solid #b9d3f2; border-radius:8px; padding:10px 14px; font-size:12px; color:#1461d2; margin-bottom:16px; }

.widget { border:1px dashed #b9d3f2; border-radius:10px; padding:14px 16px; background:#f7fafe; }
.widget .wh { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#1461d2; font-weight:700; margin-bottom:8px; }
code { background:#eef2f6; padding:1px 5px; border-radius:4px; font-size:12px; }
.crew-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #eef2f6; }
.crew-row:last-child { border-bottom:none; }
.workload { height:8px; border-radius:6px; background:#eceff3; overflow:hidden; flex:1; max-width:160px; }
.workload > span { display:block; height:100%; border-radius:6px; }
</style>
</head>
<body>

<script>
/* ============================================================
   ClearSky OMEGA — Field Service & Dispatch Console
     · technician assignment + live dispatch board
     · execution status: scheduled → completed
     · ownership continuity across internal crews AND vendors
     · signal → verify → ticket → dispatch → close loop
   Namespace: fs_*  ·  ES5-only, no build step.  Firebase compat v8.
   ============================================================ */
(function () {
  "use strict";

  window.onerror = function(msg){
    var app=document.getElementById("app");
    if(app && app.querySelector(".loading")){ app.innerHTML='<div class="card"><div class="card-b"><h3>Something went wrong</h3><p class="muted small">'+String(msg)+'</p></div></div>'; }
    return false;
  };

  var CSCONFIG=(typeof window!=="undefined"&&window.CLEARSKY_CONFIG)?window.CLEARSKY_CONFIG:null;
  var FB=(CSCONFIG&&CSCONFIG.firebase)?CSCONFIG.firebase:{
    apiKey:"AIzaSyABoM1lgOYUnd5ZadaoTMhYmA9cHa8Tyo0", authDomain:"clearsky-portal.firebaseapp.com",
    projectId:"clearsky-portal", storageBucket:"clearsky-portal.firebasestorage.app",
    messagingSenderId:"742134484347", appId:"1:742134484347:web:ab0f95fd221536158481de" };

  var APP_KEY="fieldservice";
  var TIER_LABEL={ 0:"OMEGA (All)",1:"OMEGA Core",2:"OMEGA Performance",3:"Enterprise · Alpha & Omega" };
  function tierName(n){ return TIER_LABEL[n]!=null?TIER_LABEL[n]:("Tier "+n); }
  var ADMIN_DOMAINS={ "csebuilders.com":true,"clearsky-usa.com":true };
  var COMPANY=(CSCONFIG&&CSCONFIG.companyName)?CSCONFIG.companyName:"ClearSky OMEGA";
  var ALERT_PROXY_URL="https://tools.csebuilders.com/api/om-integrations";

  /* Execution lifecycle — scheduled → completed, with the field states between. */
  var CALL_STAGES=["New","Assigned","Scheduled","En Route","On Site","Completed","Verified"];
  var PRIORITIES=["P1","P2","P3","P4"];
  var CREW_KINDS={ internal:"Internal", vendor:"Third-Party Vendor" };

  var db, auth, USER=null, WS=null;
  var STATE={ mod:"dispatch", sel:{}, cache:{} };

  /* ================= util ================= */
  function $(id){ return document.getElementById(id); }
  function el(t,c,h){ var e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; }
  function esc(s){ if(s==null)return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function money(n){ if(n==null||n==="")return "—"; var x=Number(n); if(isNaN(x))return esc(n); return "$"+x.toLocaleString(undefined,{maximumFractionDigits:0}); }
  function num(v,d){ var x=Number(v); return isNaN(x)?(d||0):x; }
  function fmtDate(d){ if(!d)return "—"; if(d&&d.toDate)d=d.toDate(); var dt=new Date(d); if(isNaN(dt))return esc(d); return (dt.getMonth()+1)+"/"+dt.getDate()+"/"+dt.getFullYear(); }
  function fmtDT(ms){ if(!ms)return "—"; var dt=new Date(ms); if(isNaN(dt))return "—"; return (dt.getMonth()+1)+"/"+dt.getDate()+" "+("0"+dt.getHours()).slice(-2)+":"+("0"+dt.getMinutes()).slice(-2); }
  function ago(ms){ if(!ms)return "—"; var s=(Date.now()-ms)/1000; if(s<0)return "in "+inHrs(-s*1000); if(s<60)return "just now"; if(s<3600)return Math.floor(s/60)+"m ago"; if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }
  function inHrs(ms){ var h=ms/3600000; if(h<1)return Math.round(h*60)+"m"; if(h<48)return h.toFixed(1)+"h"; return (h/24).toFixed(1)+"d"; }
  function initials(name){ if(!name)return "?"; var p=name.split(" "); return ((p[0]||"")[0]||"")+((p[1]||"")[0]||""); }
  function uid(p){ return (p||"id")+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7); }
  function toast(m){ var t=$("toast"); t.textContent=m; t.className="toast on"; setTimeout(function(){ t.className="toast"; },2600); }
  function coll(name){ return db.collection("fs_"+name); } // fs_calls, fs_crews, fs_signals

  var DEMO=false;

  /* ================= boot ================= */
  function boot(){
    var keyMissing=!FB.apiKey||FB.apiKey.indexOf("PLACEHOLDER")!==-1;
    if(typeof firebase==="undefined"||keyMissing) return startDemo(keyMissing?"config":"sdk");
    try{ firebase.initializeApp(FB); db=firebase.firestore(); auth=firebase.auth(); }catch(e){ return startDemo("init"); }
    auth.onAuthStateChanged(function(u){ if(!u){ auth.signInAnonymously().catch(function(){ startDemo("auth"); }); return; } onUser(u); }, function(){ startDemo("auth"); });
  }
  function startDemo(){ DEMO=true; db=makeMemDb(); onUser({ email:"admin@csebuilders.com" }); }

  function makeMemDb(){
    var store={};
    function collection(name){ store[name]=store[name]||{};
      return { _name:name, doc:function(id){ id=id||uid("doc"); return docRef(name,id); },
        where:function(f,op,v){ return query(name,[[f,op,v]]); }, limit:function(){ return query(name,[]); }, get:function(){ return query(name,[]).get(); } }; }
    function docRef(name,id){ return { id:id,
      set:function(o){ store[name][id]=clone(o); return Promise.resolve(); },
      update:function(p){ var d=store[name][id]||{}; for(var k in p)d[k]=p[k]; store[name][id]=d; return Promise.resolve(); },
      get:function(){ var d=store[name][id]; return Promise.resolve({ exists:!!d, id:id, data:function(){return clone(d);} }); } }; }
    function query(name,conds){ return { where:function(f,op,v){ return query(name,conds.concat([[f,op,v]])); }, limit:function(){ return this; },
      get:function(){ var out=[],bag=store[name]||{}; for(var id in bag){ var r=bag[id],ok=true;
        for(var i=0;i<conds.length;i++){ var c=conds[i]; if(c[1]==="=="&&r[c[0]]!==c[2]){ ok=false; break; } }
        if(ok) out.push({ id:id, data:(function(x){return function(){return clone(x);};})(r) }); }
        return Promise.resolve({ empty:out.length===0, size:out.length, forEach:function(cb){ out.forEach(cb); } }); } }; }
    function batch(){ var ops=[]; return { set:function(r,o){ ops.push(function(){ r.set(o); }); }, update:function(r,o){ ops.push(function(){ r.update(o); }); }, commit:function(){ ops.forEach(function(f){f();}); return Promise.resolve(); } }; }
    function clone(o){ return o==null?o:JSON.parse(JSON.stringify(o)); }
    return { collection:collection, batch:batch };
  }

  var OT=window.OMEGATools; var ORG=null;
  function omegaOrgRef(orgId){ return db.collection("omega_orgs").doc(orgId); }
  function workspaceOf(o){ return { orgId:o.orgId, tierLevel:o.tierLevel, unlockedTools:o.unlockedTools||[], requiredTools:o.requiredTools||[], customToolUrls:o.customToolUrls||{} }; }
  function canOpenThisApp(o){ if(!OT)return o.tierLevel>=2; var t=OT.byKey(APP_KEY); if(!t)return o.tierLevel>=2; return OT.isUnlocked(t,workspaceOf(o)); }

  function onUser(u){
    USER=u; var email=u.email||"admin@csebuilders.com"; var domain=(email.split("@")[1]||"").toLowerCase();
    if(!domain){ renderNoAuth(); return; }
    $("userEmail").textContent=email; $("userInitial").textContent=(email[0]||"?").toUpperCase();
    resolveOrg(domain,email).then(function(org){
      ORG=org; WS={ orgId:org.orgId, name:(COMPANY||org.orgId) };
      $("wsName").textContent=WS.name+(DEMO?" · DEMO":"");
      var tb=$("tierBadge"); if(tb)tb.textContent=tierName(org.tierLevel).toUpperCase();
      if(!canOpenThisApp(org)){ renderUpgrade(org); return; }
      bindNav();
      seedIfEmpty().then(function(){ render(); }).catch(function(e){ $("app").innerHTML='<div class="card"><div class="card-b"><h3>Couldn\'t load data</h3><p class="muted small">'+esc(String(e&&e.message||e))+'</p></div></div>'; });

      var arr=[]; s.forEach(function(d){ var o=d.data(); o.id=d.id; arr.push(o); });
      arr.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
      STATE.cache[name]=arr; return arr;
    });
  }

      + '</div>';

    [["Internal Teams",internal,"blue"],["Third-Party Vendors",vendors,"teal"]].forEach(function(grp){
      h+='<div class="card"><div class="card-h"><h3>'+grp[0]+'</h3><span class="sub">assignments &amp; workload</span><div class="spacer"></div><button class="btn pri sm" onclick="UI.newCrew(\''+(grp[0].indexOf("Vendor")>=0?"vendor":"internal")+'\')">+ Add</button></div><div class="card-b">';
      if(!grp[1].length) h+='<div class="empty">None yet.</div>';
      grp[1].forEach(function(x){
        var loadN=openCallsFor(x.id).length; var cap=num(x.capacity,5); var pctL=Math.min(100,loadN/cap*100);
        var barc = pctL>=90?"#b42323":pctL>=60?"#e08600":"#137a44";
        h+='<div class="crew-row"><span class="avatar '+(x.kind==="vendor"?"vendor":"")+'">'+esc(initials(x.name))+'</span>'
          +'<div style="flex:1;min-width:0"><div><b>'+esc(x.name)+'</b> '+crewDot(x.status)+' <span class="small muted">'+esc(x.status)+'</span></div>'
          +'<div class="small muted">'+esc(x.role)+(x.company?(" · "+esc(x.company)):"")+' · '+esc(x.region)+' · '+esc(x.certs||"")+'</div></div>'
          +'<div class="workload"><span style="width:'+pctL+'%;background:'+barc+'"></span></div>'
          +'<div class="small" style="width:60px;text-align:right">'+loadN+'/'+cap+'</div>'
          +'<button class="btn ghost sm" onclick="UI.openCrew(\''+x.id+'\')">View →</button></div>';
      });
      h+='</div></div>';
    });
    $("app").innerHTML=h;
  }

  function openCrew(id){
    var x=crewObj(id); if(!x)return;
    var mine=(STATE.cache.calls||[]).filter(function(c){return c.assignedTo===id;});
    var open=mine.filter(function(c){return c.stage!=="Verified";});
    var h='<a class="btn sm" onclick="UI.back()">← Back to Crews</a>';
    h+='<div class="card" style="margin-top:12px"><div class="card-h"><h3>'+esc(x.name)+'</h3><span class="sub">'+esc(x.role)+(x.company?(" · "+esc(x.company)):"")+'</span><div class="spacer"></div>'
      +(x.kind==="vendor"?'<span class="pill teal">Vendor</span>':'<span class="pill blue">Internal</span>')
      +'<button class="btn sm" onclick="UI.editCrew(\''+x.id+'\')">Edit</button></div><div class="card-b">';
    h+='<div class="row"><div class="col" style="max-width:340px"><div class="section-h">Details</div><div class="dl">';
    h+=fld("Type",CREW_KINDS[x.kind])+fld("Status",x.status);
    h+=fld("Region",x.region)+fld("Capacity",num(x.capacity)+" concurrent");
    h+=fld("Phone",x.phone)+fld("Email",x.email);
    if(x.company)h+=fld2("Company",x.company);
    h+=fld2("Certifications",x.certs);
    h+='</div></div>';
    h+='<div class="col"><div class="section-h">Assigned Work ('+open.length+' open)</div><div class="tbl-wrap"><table><thead><tr><th>Call</th><th>Site</th><th>Priority</th><th>Stage</th></tr></thead><tbody>';
    if(!mine.length) h+='<tr><td colspan="4" class="empty">No assignments.</td></tr>';
    mine.forEach(function(c){ h+='<tr><td><a onclick="UI.openCall(\''+c.id+'\')"><b>'+esc(c.num)+'</b></a></td><td class="small">'+esc(c.site)+'</td><td>'+prioPill(c.priority)+'</td><td>'+stagePill(c.stage)+'</td></tr>'; });
    h+='</tbody></table></div></div></div>';
    h+='</div></div>';
    $("app").innerHTML=h;
  }
  function fld2(l,v){ return '<div class="fld" style="grid-column:1/3"><label>'+esc(l)+'</label><div class="val">'+esc(v||"—")+'</div></div>'; }

  /* ---------------- SCHEDULE (next 7 days) ---------------- */
  function renderSchedule(){
    var calls=STATE.cache.calls||[];
    var scheduled=calls.filter(function(c){return c.scheduledAt && c.stage!=="Verified";});
    scheduled.sort(function(a,b){return a.scheduledAt-b.scheduledAt;});
    var h=info("Fewer gaps between planned work and field execution. Upcoming scheduled visits across all crews and vendors.");
    // group by day
    var days={};
    scheduled.forEach(function(c){ var d=new Date(c.scheduledAt); var key=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); (days[key]=days[key]||[]).push(c); });
    var keys=Object.keys(days).sort();
    h+='<div class="card"><div class="card-h"><h3>Upcoming Schedule</h3><span class="sub">Planned site visits</span></div><div class="card-b">';
    if(!keys.length) h+='<div class="empty">Nothing scheduled.</div>';
    keys.forEach(function(k){
      var d=new Date(k+"T00:00:00");
      h+='<div class="section-h">'+d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})+'</div>';
      h+='<div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Call</th><th>Site</th><th>Owner</th><th>Priority</th><th>Stage</th></tr></thead><tbody>';
      days[k].forEach(function(c){ h+='<tr><td class="small">'+new Date(c.scheduledAt).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"})+'</td><td><a onclick="UI.openCall(\''+c.id+'\')"><b>'+esc(c.num)+'</b></a> '+esc(c.title)+'</td><td class="small">'+esc(c.site)+'</td><td>'+avatar(c)+' <span class="small">'+esc(c.assignedName||"—")+'</span>'+(c.assignedKind==="vendor"?' <span class="pill teal">V</span>':'')+'</td><td>'+prioPill(c.priority)+'</td><td>'+stagePill(c.stage)+'</td></tr>'; });
      h+='</tbody></table></div>';
    });
    h+='</div></div>';
    $("app").innerHTML=h;
  }

  /* ---------------- SIGNAL INBOX (verify → ticket) ---------------- */
  function renderSignals(){
    var signals=STATE.cache.signals||[];
    var newS=signals.filter(function(s){return s.status==="new";});
    var h=info("Ticketing tied directly to performance signals: verify the data, then create a service call. Dismiss false positives so crews only chase real faults.");
    h+='<div class="kpis">'
      + kpi(newS.length,"New Signals", newS.length?"warn":"good")
      + kpi(signals.filter(function(s){return s.status==="ticketed";}).length,"Converted to Calls","good")
      + kpi(signals.filter(function(s){return s.status==="dismissed";}).length,"Dismissed")
      + '</div>';
    h+='<div class="card"><div class="card-h"><h3>Performance Signal Inbox</h3><span class="sub">Detection layer → dispatch</span></div><div class="card-b"><div class="tbl-wrap"><table><thead><tr>'
      +'<th>Signal</th><th>Site</th><th>Metric</th><th>Detail</th><th>Severity</th><th>Confidence</th><th>Raised</th><th>Actions</th></tr></thead><tbody>';
    if(!signals.length) h+='<tr><td colspan="8" class="empty">No signals. Monitoring integrations feed this inbox.</td></tr>';
    signals.forEach(function(s){
      var statePill = s.status==="new"?'':(s.status==="ticketed"?'<span class="pill green">Ticketed</span>':(s.status==="dismissed"?'<span class="pill gray">Dismissed</span>':'<span class="pill amber">Snoozed</span>'));
      var actions = s.status==="new"||s.status==="snoozed"
        ? '<button class="btn ok sm" onclick="UI.signalToCall(\''+s.id+'\')">✓ Verify → Call</button> <button class="btn sm" onclick="UI.dismissSignal(\''+s.id+'\')">Dismiss</button>'
        : statePill+' '+(s.callId?'<button class="btn ghost sm" onclick="UI.openCall(\''+s.callId+'\')">View call →</button>':'');
      h+='<tr><td><b>'+esc(s.ref)+'</b></td><td class="small">'+esc(s.site)+'</td><td>'+esc(s.metric)+'</td><td class="small">'+esc(s.detail)+'</td><td>'+prioPill(s.severity)+'</td><td class="small">'+esc(s.confidence||"—")+'</td><td class="small muted">'+ago(s.raisedAt)+'</td><td>'+actions+'</td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div class="small muted" style="margin-top:10px">"Verify → Call" spawns a service call pre-filled from the signal and links them, so closing the call requires confirming the signal cleared.</div>';
    h+='</div></div>';
    $("app").innerHTML=h;
  }
  function openSignals(){ STATE.mod="signals"; var links=$("nav").getElementsByTagName("a"); for(var i=0;i<links.length;i++){ links[i].className=(links[i].getAttribute("data-mod")==="signals"?"on":""); } render(); }

  /* ---------------- SETTINGS ---------------- */
  function renderSettings(){
    var h=info("Field service connects your monitoring (signal source), dispatch tools, and notifications — all through the shared secure proxy.");
    h+='<div class="card"><div class="card-h"><h3>Connected Systems</h3><span class="sub">Managed in the O&M Console integration hub</span></div><div class="card-b"><div class="tbl-wrap"><table><thead><tr><th>System</th><th>Role here</th><th></th></tr></thead><tbody>';
    [["Monitoring / DAS","Feeds the Signal Inbox (Power Factors, AlsoEnergy, EMS…)"],
     ["ServiceNow / ServiceTitan","Two-way work-order sync for dispatch"],
     ["Monday.com","Board-based call sync"],
     ["Slack / Twilio","On-call notifications & P1 escalation"]].forEach(function(r){
      h+='<tr><td><b>'+esc(r[0])+'</b></td><td class="small muted">'+esc(r[1])+'</td><td style="text-align:right"><a class="btn sm" href="https://tools.csebuilders.com" target="_blank">Manage in O&M Console ↗</a></td></tr>';
    });
    h+='</tbody></table></div></div></div>';
    h+='<div class="card"><div class="card-h"><h3>Portal Data Feed</h3><span class="sub">How the portal consumes field service</span></div><div class="card-b"><p class="small">Each call publishes <code>{stage, priority, assignedName, assignedKind, scheduledAt, slaStatus}</code> under <code>fs_calls/{id}</code>, plus a per-site rollup <code>{openCalls, nextVisit, awaitingVerify}</code> and an org aggregate at <code>fs_rollup/'+esc(WS.orgId)+'</code>. Joined to the portal project card by <code>editorProjectId</code> / <code>mondayBoardId</code> — the same identity the editor, O&M, and SLA consoles use.</p></div></div>';
    $("app").innerHTML=h;
  }

  /* ================= mutations ================= */
  function persist(name,id,patch,then){ coll(name).doc(id).update(patch).then(function(){ invalidate(name); if(then)then(); }).catch(function(){ toast("Save failed"); }); }

  function setCallStage(id,stage){
    var c=callObj(id); if(!c)return;
    var patch={ stage:stage }; var log=(c.log||[]).slice(); log.push({ t:Date.now(), m:"Stage → "+stage }); patch.log=log;
    if(stage==="Completed" && !c.completedAt){ patch.completedAt=Date.now(); }
    if(stage==="Verified" && !c.verifiedAt){ patch.verifiedAt=Date.now(); }
    c.stage=stage; c.log=log;
    persist("calls",id,patch,function(){ openCall(id); }); toast("Stage updated");
  }
  function advanceCall(id){ var c=callObj(id); if(!c)return; var i=CALL_STAGES.indexOf(c.stage); if(i<CALL_STAGES.length-1) setCallStage(id,CALL_STAGES[i+1]); else toast("Already verified"); }
  function reopenCall(id){ var c=callObj(id); if(!c)return; var log=(c.log||[]).slice(); log.push({t:Date.now(),m:"Reopened — signal still active",sig:true}); c.stage="On Site"; c.log=log; persist("calls",id,{stage:"On Site",log:log},function(){ openCall(id); }); toast("Reopened"); }
  function verifyClose(id){ var c=callObj(id); if(!c)return; var log=(c.log||[]).slice(); log.push({t:Date.now(),m:"Data verified stable — call closed"}); c.stage="Verified"; c.log=log;
    persist("calls",id,{stage:"Verified",verifiedAt:Date.now(),log:log},function(){ // clear linked signal
      if(c.signalRef){ var sig=(STATE.cache.signals||[]).filter(function(s){return s.ref===c.signalRef;})[0]; if(sig){ persist("signals",sig.id,{status:"cleared"}); } }
      openCall(id); }); toast("Verified & closed"); }
  function addCallNote(id){ var v=($("logInput")||{}).value||""; if(!v.trim())return; var c=callObj(id); if(!c)return; var log=(c.log||[]).slice(); log.push({t:Date.now(),m:v.trim()}); c.log=log; persist("calls",id,{log:log},function(){ openCall(id); }); }

  function assignCall(id){
    var c=callObj(id); if(!c)return; var crews=STATE.cache.crews||[];
    var body='<p class="small muted" style="margin-top:0">Assign to an internal crew or hand off to a vendor. Ownership stays continuous — the change is logged.</p>';
    body+='<div class="form-row"><label class="f">Owner</label><select id="asgSel"><option value="">— Unassigned —</option>';
    body+='<optgroup label="Internal">';
    crews.filter(function(x){return x.kind==="internal";}).forEach(function(x){ var load=openCallsFor(x.id).length; body+='<option value="'+x.id+'"'+(c.assignedTo===x.id?" selected":"")+'>'+esc(x.name)+' · '+esc(x.role)+' ('+load+'/'+num(x.capacity)+')</option>'; });
    body+='</optgroup><optgroup label="Vendors">';
    crews.filter(function(x){return x.kind==="vendor";}).forEach(function(x){ var load=openCallsFor(x.id).length; body+='<option value="'+x.id+'"'+(c.assignedTo===x.id?" selected":"")+'>'+esc(x.name)+' · '+esc(x.company||x.role)+' ('+load+'/'+num(x.capacity)+')</option>'; });
    body+='</optgroup></select></div>';
    $("ovTitle").textContent="Assign "+c.num; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Assign"); go.onclick=function(){
      var tid=$("asgSel").value; var cr=crewObj(tid); var log=(c.log||[]).slice();
      var prev=c.assignedName;
      log.push({ t:Date.now(), m: cr?((prev?("Reassigned from "+prev+" to "):"Assigned ")+cr.name+" ("+(cr.kind==="vendor"?"vendor":"internal")+")"):"Unassigned" });
      c.assignedTo=tid; c.assignedName=cr?cr.name:""; c.assignedKind=cr?cr.kind:""; c.log=log;
      var patch={ assignedTo:tid, assignedName:c.assignedName, assignedKind:c.assignedKind, log:log };
      if(cr && c.stage==="New"){ patch.stage="Assigned"; c.stage="Assigned"; }
      persist("calls",id,patch,function(){ closeModal(); openCall(id); toast("Ownership updated"); });
    };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }

  function scheduleCall(id){
    var c=callObj(id); if(!c)return;
    var body='<div class="form-2"><div class="form-row"><label class="f">Date</label><input id="sc_date" type="date"></div><div class="form-row"><label class="f">Time</label><input id="sc_time" type="time" value="09:00"></div></div>';
    $("ovTitle").textContent="Schedule "+c.num; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Schedule"); go.onclick=function(){
      var dv=$("sc_date").value, tv=$("sc_time").value||"09:00"; if(!dv){ toast("Pick a date"); return; }
      var ms=new Date(dv+"T"+tv+":00").getTime(); var log=(c.log||[]).slice(); log.push({t:Date.now(),m:"Scheduled for "+fmtDT(ms)});
      var patch={ scheduledAt:ms, log:log }; if(c.stage==="New"||c.stage==="Assigned"){ patch.stage="Scheduled"; c.stage="Scheduled"; }
      c.scheduledAt=ms; c.log=log; persist("calls",id,patch,function(){ closeModal(); openCall(id); toast("Scheduled"); });
    };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }

  function notify(id){ var c=callObj(id); if(!c)return; if(DEMO){ toast("Demo: on-call notified via Slack/SMS"); return; }
    fetch(ALERT_PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"alert",orgId:WS.orgId,kind:"dispatch",call:c.num,user:(USER&&USER.email)||""})}).then(function(){ toast("Notified"); }).catch(function(){ toast("Notify failed"); }); }

  function newCall(prefill){
    prefill=prefill||{};
    var body='<div class="form-row"><label class="f">Title</label><input id="c_title" value="'+esc(prefill.title||"")+'"></div>';
    body+='<div class="form-2"><div class="form-row"><label class="f">Site</label><input id="c_site" value="'+esc(prefill.site||"")+'" placeholder="Site name"></div>';
    body+='<div class="form-row"><label class="f">Category</label><input id="c_cat" value="'+esc(prefill.category||"")+'" placeholder="Inverter / BESS / PV / Comms"></div></div>';
    body+='<div class="form-3"><div class="form-row"><label class="f">Priority</label><select id="c_prio">'+PRIORITIES.map(function(p){return '<option'+(prefill.severity===p?" selected":"")+'>'+p+'</option>';}).join("")+'</select></div>';
    body+='<div class="form-row"><label class="f">SLA (hrs)</label><input id="c_sla" type="number" value="'+(prefill.slaHours||24)+'"></div>';
    body+='<div class="form-row"><label class="f">Rev Impact $</label><input id="c_rev" type="number" value="'+(prefill.revImpact||0)+'"></div></div>';
    body+='<div class="form-row"><label class="f">Linked projectId (optional)</label><input id="c_pid" value="'+esc(prefill.editorProjectId||"")+'" placeholder="editor_…"></div>';
    $("ovTitle").textContent="New Service Call"; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Create"); go.onclick=function(){
      var num2="SC-"+(2043+Math.floor(Math.random()*900));
      var o={ orgId:WS.orgId, num:num2, site:$("c_site").value||"—", siteId:prefill.siteId||"", editorProjectId:$("c_pid").value, source: prefill.source||($("c_pid").value?"repo":"repo"),
        title:$("c_title").value||"Untitled", category:$("c_cat").value||"General", priority:$("c_prio").value,
        stage:"New", assignedTo:"", assignedName:"", assignedKind:"", origin:prefill.origin||"manual", signalRef:prefill.signalRef||"",
        slaHours:num($("c_sla").value,24), revImpact:num($("c_rev").value,0), downMwh:prefill.downMwh||0,
        openedAt:Date.now(), createdAt:Date.now(),
        log:[{t:Date.now(),m:prefill.origin==="signal"?("Created from verified signal "+prefill.signalRef):"Call created manually",sig:prefill.origin==="signal"}] };
      if(prefill.mondayBoardId)o.mondayBoardId=prefill.mondayBoardId;
      coll("calls").doc(uid("call")).set(o).then(function(){ invalidate("calls"); closeModal();
        if(prefill._sigId){ persist("signals",prefill._sigId,{status:"ticketed"}); }
        STATE.mod="dispatch"; render(); toast("Call "+num2+" created"); });
    };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }

  function signalToCall(id){
    var s=(STATE.cache.signals||[]).filter(function(x){return x.id===id;})[0]; if(!s)return;
    // link signal id so creating the call marks it ticketed; also stash callId back on signal
    newCall({ title:s.metric+" — "+s.detail, site:s.site, siteId:s.siteId, category:s.metric, severity:s.severity,
      origin:"signal", signalRef:s.ref, source:s.source, editorProjectId:s.editorProjectId, mondayBoardId:s.mondayBoardId,
      slaHours: s.severity==="P1"?4:(s.severity==="P2"?24:48), _sigId:id });
  }
  function dismissSignal(id){
    var s=(STATE.cache.signals||[]).filter(function(x){return x.id===id;})[0]; if(!s)return;
    var body='<div class="form-row"><label class="f">Reason (audit)</label><input id="dsm" placeholder="e.g. Known curtailment, false positive"></div>';
    $("ovTitle").textContent="Dismiss "+s.ref; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Dismiss"); go.onclick=function(){ persist("signals",id,{status:"dismissed",dismissReason:$("dsm").value||"",dismissedAt:Date.now()},function(){ closeModal(); renderSignals(); toast("Dismissed"); }); };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }

  function newCrew(kind){ formCrew({ kind:kind||"internal" }); }
  function editCrew(id){ formCrew(crewObj(id)); }
  function formCrew(x){
    x=x||{};
    var body='<div class="form-2"><div class="form-row"><label class="f">Name</label><input id="k_name" value="'+esc(x.name||"")+'"></div>';
    body+='<div class="form-row"><label class="f">Type</label><select id="k_kind"><option value="internal"'+(x.kind==="internal"?" selected":"")+'>Internal</option><option value="vendor"'+(x.kind==="vendor"?" selected":"")+'>Third-Party Vendor</option></select></div></div>';
    body+='<div class="form-2"><div class="form-row"><label class="f">Role</label><input id="k_role" value="'+esc(x.role||"")+'"></div>';
    body+='<div class="form-row"><label class="f">Company (vendors)</label><input id="k_co" value="'+esc(x.company||"")+'"></div></div>';
    body+='<div class="form-3"><div class="form-row"><label class="f">Region</label><input id="k_region" value="'+esc(x.region||"")+'"></div>';
    body+='<div class="form-row"><label class="f">Status</label><select id="k_status"><option'+(x.status==="Available"?" selected":"")+'>Available</option><option'+(x.status==="On Site"?" selected":"")+'>On Site</option><option'+(x.status==="Off"?" selected":"")+'>Off</option></select></div>';
    body+='<div class="form-row"><label class="f">Capacity</label><input id="k_cap" type="number" value="'+num(x.capacity,5)+'"></div></div>';
    body+='<div class="form-2"><div class="form-row"><label class="f">Phone</label><input id="k_phone" value="'+esc(x.phone||"")+'"></div>';
    body+='<div class="form-row"><label class="f">Email</label><input id="k_email" value="'+esc(x.email||"")+'"></div></div>';
    body+='<div class="form-row"><label class="f">Certifications</label><input id="k_certs" value="'+esc(x.certs||"")+'"></div>';
    $("ovTitle").textContent=x.id?"Edit Crew":"Add Crew"; $("ovBody").innerHTML=body; $("ovFoot").innerHTML='';
    var cancel=el("button","btn","Cancel"); cancel.onclick=closeModal;
    var go=el("button","btn pri","Save"); go.onclick=function(){
      var o={ orgId:WS.orgId, name:$("k_name").value||"New Crew", kind:$("k_kind").value, role:$("k_role").value, company:$("k_co").value,
        region:$("k_region").value, status:$("k_status").value, capacity:num($("k_cap").value,5), phone:$("k_phone").value, email:$("k_email").value, certs:$("k_certs").value,
        createdAt:x.createdAt||Date.now() };
      var ref=x.id?coll("crews").doc(x.id):coll("crews").doc(uid("crew"));
      ref.set(o).then(function(){ invalidate("crews"); closeModal(); STATE.mod="crews"; render(); toast("Crew saved"); });
    };
    $("ovFoot").appendChild(cancel); $("ovFoot").appendChild(go); $("ov").className="ov on";
  }

  function closeModal(){ $("ov").className="ov"; }
  function back(){ STATE.sel={}; render(); }

  /* ================= expose ================= */
  window.UI = {
    openCall:openCall, newCall:newCall, setCallStage:setCallStage, advanceCall:advanceCall,
    assignCall:assignCall, scheduleCall:scheduleCall, addCallNote:addCallNote, notify:notify,
    verifyClose:verifyClose, reopenCall:reopenCall,
    openCrew:openCrew, newCrew:newCrew, editCrew:editCrew,
    openSignals:openSignals, signalToCall:signalToCall, dismissSignal:dismissSignal,
    back:back, closeModal:closeModal
  };

  boot();
})();
</script>
</body>
</html>
